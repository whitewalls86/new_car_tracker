x-airflow-common:
  &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
  image: cartracker-airflow
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "True"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow_user:${AIRFLOW_DB_PASSWORD}@postgres:5432/cartracker
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/airflow/execution/'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET}
    AIRFLOW_CONN_CARTRACKER_DB: postgresql://airflow_app_user:${AIRFLOW_APP_DB_PASSWORD}@postgres:5432/cartracker
    TELEGRAM_API: ${TELEGRAM_API}
    TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    # Plan 86: StatsD → statsd-exporter → Prometheus
    AIRFLOW__METRICS__STATSD_ON: 'true'
    AIRFLOW__METRICS__STATSD_HOST: statsd-exporter
    AIRFLOW__METRICS__STATSD_PORT: '9125'
    AIRFLOW__METRICS__STATSD_PREFIX: 'airflow'
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/sql:/opt/airflow/sql
    - airflow_logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  networks:
    - cartracker-net
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    container_name: cartracker-postgres
    restart: unless-stopped
    command: >
      postgres
      -c shared_buffers=2GB
      -c max_connections=100
    shm_size: 1gb
    environment:
      POSTGRES_DB: cartracker
      POSTGRES_USER: cartracker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U cartracker -d cartracker" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - cartracker_pgdata:/var/lib/postgresql/data
    networks:
      - cartracker-net

  flyway:
    image: flyway/flyway:10-alpine
    platform: linux/amd64
    container_name: cartracker-flyway
    restart: "no"
    command: >
      -url=jdbc:postgresql://postgres:5432/cartracker
      -user=cartracker
      -password=${POSTGRES_PASSWORD}
      -locations=filesystem:/flyway/sql
      -detectEncoding=true
      -placeholders.viewerPassword=${VIEWER_DB_PASSWORD}
      -placeholders.scraperPassword=${SCRAPER_DB_PASSWORD}
      -placeholders.dbtPassword=${DBT_DB_PASSWORD}
      -placeholders.authEmailSalt=${AUTH_EMAIL_SALT}
      -placeholders.adminEmail=${ADMIN_EMAIL}
      -placeholders.airflowPassword=${AIRFLOW_DB_PASSWORD}
      -placeholders.airflowAppPassword=${AIRFLOW_APP_DB_PASSWORD}
      -placeholders.metricsPassword=${METRICS_DB_PASSWORD}
      -defaultSchema=public
      -baselineOnMigrate=true
      migrate
    volumes:
      - ./db/migrations:/flyway/sql:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cartracker-net

  n8n:
    image: n8nio/n8n:latest
    container_name: cartracker-n8n
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/entrypoint-custom.sh"]
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro
      - ./n8n/entrypoint.sh:/entrypoint-custom.sh:ro
    networks:
      - cartracker-net
    environment:
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - EXECUTIONS_DATA_PRUNE_MAX=1000
      - N8N_HOST=cartracker.info
      - N8N_PROTOCOL=https
      - N8N_PATH=/n8n/
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - TELEGRAM_API=${TELEGRAM_API}
      - N8N_USER_MANAGEMENT_DISABLED=true

  ops:
    build:
      context: .
      dockerfile: ops/Dockerfile
    image: cartracker-ops
    container_name: cartracker-ops
    restart: unless-stopped
    ports:
      - "8060:8060"
    volumes:
      - ops_logs:/usr/app/logs
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: cartracker
      PGUSER: cartracker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AUTH_EMAIL_SALT: ${AUTH_EMAIL_SALT}
      TELEGRAM_API: ${TELEGRAM_API}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      DBT_RUNNER_URL: http://dbt_runner:8080
      DBT_DOCS_URL: http://localhost:8081/dbt-docs/
      SCRAPER_URL: http://scraper:8000
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    networks:
      - cartracker-net
    depends_on:
      flyway:
        condition: service_completed_successfully

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: cartracker-flaresolverr
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
    networks:
      - cartracker-net

  scraper:
    build:
      context: .
      dockerfile: scraper/Dockerfile
    image: cartracker-scraper
    container_name: cartracker-scraper
    restart: unless-stopped
    volumes:
      - cartracker_raw:/data/raw
      - scraper_logs:/usr/app/logs
    environment:
      DATABASE_URL: postgresql://scraper_user:${SCRAPER_DB_PASSWORD}@postgres:5432/cartracker
      DBT_RUNNER_URL: http://dbt_runner:8080
      DBT_DOCS_URL: http://localhost:8081/dbt-docs/
      FLARESOLVERR_URL: http://flaresolverr:8191
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: bronze
    networks:
      - cartracker-net
    depends_on:
      - flaresolverr
      - minio

  dbt:
    build:
      context: .
      dockerfile: dbt/Dockerfile
    container_name: cartracker-dbt
    working_dir: /usr/app
    environment:
      DBT_PROFILES_DIR: /usr/app
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: cartracker
      PGUSER: dbt_user
      POSTGRES_PASSWORD: ${DBT_DB_PASSWORD}
    networks:
      - cartracker-net
    profiles: ["tools"]
    volumes:
      - ./target:/usr/app/target

  dbt_test:
    build:
      context: .
      dockerfile: dbt/Dockerfile
    container_name: cartracker-dbt-test
    working_dir: /usr/app
    environment:
      DBT_PROFILES_DIR: /usr/app
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: cartracker
      PGUSER: dbt_user
      POSTGRES_PASSWORD: ${DBT_DB_PASSWORD}
    networks:
      - cartracker-net
    profiles: [ "tools" ]
    volumes:
      - ./target:/usr/app/target

  dbt_runner:
    build:
      context: .
      dockerfile: dbt_runner/Dockerfile
    container_name: cartracker-dbt-runner
    restart: unless-stopped
    working_dir: /usr/app
    environment:
      DBT_PROFILES_DIR: /usr/app
      POSTGRES_URL: postgresql://dbt_user:${DBT_DB_PASSWORD}@postgres:5432/cartracker
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cartracker}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: bronze
      DUCKDB_PATH: /data/analytics/analytics.duckdb
    networks:
      - cartracker-net
    depends_on:
      minio:
        condition: service_started
    volumes:
      - ./target:/usr/app/target
      - dbt_runner_logs:/usr/app/logs
      - analytics_db:/data/analytics



  minio:
    image: minio/minio:latest
    container_name: cartracker-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO web console
    volumes:
      - parquet_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cartracker}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: "https://cartracker.info/minio"
      MINIO_IDENTITY_OPENID_CONFIG_URL: "https://accounts.google.com/.well-known/openid-configuration"
      MINIO_IDENTITY_OPENID_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      MINIO_IDENTITY_OPENID_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      MINIO_IDENTITY_OPENID_REDIRECT_URI: "https://cartracker.info/minio/oauth_callback"
      MINIO_IDENTITY_OPENID_CLAIM_NAME: "email"
      MINIO_IDENTITY_OPENID_SCOPES: "openid,email,profile"
      # Plan 86: allow Prometheus to scrape metrics without auth (internal network only)
      MINIO_PROMETHEUS_AUTH_TYPE: public
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - cartracker-net

  archiver:
    build:
      context: .
      dockerfile: archiver/Dockerfile
    image: cartracker-archiver
    container_name: cartracker-archiver
    volumes:
      - cartracker_raw:/data/raw
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: cartracker
      PGUSER: scraper_user
      POSTGRES_PASSWORD: ${SCRAPER_DB_PASSWORD}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: bronze
    depends_on:
      flyway:
        condition: service_completed_successfully
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - cartracker-net

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: cartracker-dashboard
    container_name: cartracker-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: postgresql://viewer:${VIEWER_DB_PASSWORD}@postgres:5432/cartracker
      DUCKDB_PATH: /data/analytics/analytics.duckdb
    depends_on:
      flyway:
        condition: service_completed_successfully
    networks:
      - cartracker-net
    volumes:
      - analytics_db:/data/analytics:ro

  pgadmin:
    image: dpage/pgadmin4
    container_name: cartracker-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      SCRIPT_NAME: /pgadmin
      PGADMIN_CONFIG_AUTHENTICATION_SOURCES: "['webserver']"
      PGADMIN_CONFIG_WEBSERVER_REMOTE_USER: "'X-Auth-Request-Email'"
      PGADMIN_CONFIG_WEBSERVER_AUTO_CREATE_USER: "True"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - cartracker-net

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: cartracker-oauth2-proxy
    restart: unless-stopped
    command: --config=/etc/oauth2-proxy/oauth2-proxy.cfg --reverse-proxy=true
    volumes:
      - ./oauth2-proxy/oauth2-proxy.cfg:/etc/oauth2-proxy/oauth2-proxy.cfg:ro
    environment:
      OAUTH2_PROXY_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_COOKIE_SECRET}
    networks:
      - cartracker-net

  caddy:
    image: caddy:latest
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - dashboard
      - ops
      - n8n
      - oauth2-proxy
      - airflow-apiserver
      - grafana
    networks:
      - cartracker-net

  processing:
    build:
      context: .
      dockerfile: processing/Dockerfile
    image: cartracker-processing
    container_name: cartracker-processing
    restart: unless-stopped
    ports:
      - "8070:8070"
    volumes:
      - cartracker_raw:/data/raw
      - processing_logs:/usr/app/logs
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: cartracker
      PGUSER: cartracker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: bronze
    networks:
      - cartracker-net
    depends_on:
      flyway:
        condition: service_completed_successfully
      minio:
        condition: service_healthy

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/{logs,dags,plugins}
        exec /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD}
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully

  airflow-apiserver:
    <<: *airflow-common
    command: api-server --proxy-headers
    container_name: cartracker-airflow-apiserver
    ports:
      - "8080:8080"
    environment:
      <<: *airflow-common-env
      AIRFLOW__API__BASE_URL: "https://cartracker.info/airflow"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    container_name: cartracker-airflow-scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    container_name: cartracker-airflow-dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    container_name: cartracker-airflow-triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ── Plan 86: Observability stack ─────────────────────────────────────────────

  statsd-exporter:
    image: prom/statsd-exporter:latest
    container_name: cartracker-statsd-exporter
    restart: unless-stopped
    networks:
      - cartracker-net

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: cartracker-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://metrics_user:${METRICS_DB_PASSWORD}@postgres:5432/cartracker?sslmode=disable
    networks:
      - cartracker-net
    depends_on:
      flyway:
        condition: service_completed_successfully

  node-exporter:
    image: prom/node-exporter:latest
    container_name: cartracker-node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - cartracker-net

  prometheus:
    image: prom/prometheus:latest
    container_name: cartracker-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - cartracker-net

  grafana:
    image: grafana/grafana:latest
    container_name: cartracker-grafana
    restart: unless-stopped
    environment:
      GF_SERVER_ROOT_URL: https://cartracker.info/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: 'true'
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_AUTH_DISABLE_LOGIN_FORM: 'false'
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - cartracker-net
    depends_on:
      - prometheus

volumes:
  cartracker_pgdata:
    external: true
    name: cartracker_pgdata

  cartracker_raw:
    external: true
    name: cartracker_raw

  n8n_data:
    external: true
    name: n8n_data

  pgadmin_data:

  scraper_logs:

  dbt_runner_logs:

  analytics_db:

  ops_logs:

  parquet_data:

  caddy_data:
  caddy_config:

  airflow_logs:

  processing_logs:

  prometheus_data:

  grafana_data:

networks:
  cartracker-net:
    external: true
