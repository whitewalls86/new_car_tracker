services:
  postgres:
    image: postgres:16
    container_name: cartracker-postgres
    restart: unless-stopped
    command: >
      postgres
      -c shared_buffers=2GB
      -c max_connections=50
    shm_size: 1gb
    environment:
      POSTGRES_DB: cartracker
      POSTGRES_USER: cartracker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - cartracker_pgdata:/var/lib/postgresql/data
    networks:
      - cartracker-net

  n8n:
    image: n8nio/n8n:latest
    container_name: cartracker-n8n
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/entrypoint-custom.sh"]
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro
      - ./n8n/entrypoint.sh:/entrypoint-custom.sh:ro
    networks:
      - cartracker-net
    environment:
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - EXECUTIONS_DATA_PRUNE_MAX=1000

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    image: cartracker-scraper
    container_name: cartracker-scraper
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - cartracker_raw:/data/raw
    environment:
      DATABASE_URL: postgresql://cartracker:${POSTGRES_PASSWORD}@postgres:5432/cartracker
    networks:
      - cartracker-net

  dbt:
    build:
      context: .
      dockerfile: dbt/Dockerfile
    container_name: cartracker-dbt
    working_dir: /usr/app
    environment:
      DBT_PROFILES_DIR: /usr/app
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: cartracker
      PGUSER: cartracker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - cartracker-net
    profiles: ["tools"]
    volumes:
      - ./target:/usr/app/target

  dbt_test:
    build:
      context: .
      dockerfile: dbt/Dockerfile
    container_name: cartracker-dbt-test
    working_dir: /usr/app
    environment:
      DBT_PROFILES_DIR: /usr/app
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: cartracker
      PGUSER: cartracker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - cartracker-net
    profiles: [ "tools" ]
    volumes:
      - ./target:/usr/app/target

  dbt_runner:
    build:
      context: .
      dockerfile: dbt_runner/Dockerfile
    container_name: cartracker-dbt-runner
    restart: unless-stopped
    working_dir: /usr/app
    environment:
      DBT_PROFILES_DIR: /usr/app
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: cartracker
      PGUSER: cartracker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - cartracker-net
    depends_on:
      - postgres
    # Optional: only needed if you want to hit it from your host browser/curl
    ports:
      - "8081:8080"



  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: cartracker-dashboard
    container_name: cartracker-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: postgresql://cartracker:${POSTGRES_PASSWORD}@postgres:5432/cartracker
    depends_on:
      - postgres
    networks:
      - cartracker-net

  pgadmin:
    image: dpage/pgadmin4
    container_name: cartracker-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - cartracker-net

volumes:
  cartracker_pgdata:
    external: true
    name: cartracker_pgdata

  cartracker_raw:
    external: true
    name: cartracker_raw

  n8n_data:
    external: true
    name: n8n_data

  pgadmin_data:

networks:
  cartracker-net:
    external: true
