global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: airflow
    static_configs:
      - targets: ['statsd-exporter:9102']

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ['minio:9000']

  - job_name: minio_bucket
    metrics_path: /minio/v2/metrics/bucket
    static_configs:
      - targets: ['minio:9000']

  - job_name: ops
    metrics_path: /metrics
    static_configs:
      - targets: ['ops:8060']

  - job_name: processing
    metrics_path: /metrics
    static_configs:
      - targets: ['processing:8070']

  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']
