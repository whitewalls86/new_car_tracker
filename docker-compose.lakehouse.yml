# Plan 112 Gate A1: standalone Compose file for the Lakekeeper REST catalog
# spike. Deliberately NOT merged into docker-compose.yml / the main Compose
# project: `down`/`down -v` against this file can only ever affect resources
# declared in *this* file, so it is safe to use freely, including full
# teardown. Never add these services to the main docker-compose.yml under a
# `profiles:` key instead -- `docker compose --profile <name> down -v`
# against the main file still resolves against the ENTIRE main project. See
# docs/plan_112_refresh_policy_backtesting.md for the full rationale.
#
# VM/local usage (joins the real cartracker-net + real minio):
#   docker compose -f docker-compose.lakehouse.yml -p cartracker-lakehouse \
#     up -d lakekeeper-postgres lakekeeper
#
# CI usage adds docker-compose.lakehouse.ci.yml as a second -f -- see
# docs/plan_112_refresh_policy_backtesting.md.
#
# This file touches no production Postgres, no Flyway migration, and no
# production volume. A1 stood up only the catalog + its isolated metadata
# store. Gate A2 adds `lakehouse-worker` (profile-gated, PySpark), built from
# lakehouse/Dockerfile -- see docs/plan_112_refresh_policy_backtesting.md for A2 commands.

services:
  lakekeeper-postgres:
    image: postgres:16
    container_name: cartracker-lakekeeper-postgres
    environment:
      POSTGRES_DB: lakekeeper
      POSTGRES_USER: lakekeeper
      POSTGRES_PASSWORD: ${LAKEKEEPER_DB_PASSWORD}
    volumes:
      # Owned entirely by this project; never referenced by docker-compose.yml.
      - lakekeeper_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lakekeeper -d lakekeeper"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cartracker-net

  lakekeeper-migrate:
    # Pinned tagged release per Q6 of the Gate A/B plan: avoid `:latest-main`
    # and avoid the old/wrong `quay.io/lakekeeper/lakekeeper` repository.
    image: ${LAKEKEEPER_IMAGE:-quay.io/lakekeeper/catalog:v0.13.1}
    container_name: cartracker-lakekeeper-migrate
    command: ["migrate"]
    restart: "no"
    environment:
      LAKEKEEPER__PG_ENCRYPTION_KEY: ${LAKEKEEPER_PG_ENCRYPTION_KEY}
      LAKEKEEPER__PG_DATABASE_URL_READ: postgresql://lakekeeper:${LAKEKEEPER_DB_PASSWORD}@lakekeeper-postgres:5432/lakekeeper
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgresql://lakekeeper:${LAKEKEEPER_DB_PASSWORD}@lakekeeper-postgres:5432/lakekeeper
      LAKEKEEPER__AUTHZ_BACKEND: allowall
    depends_on:
      lakekeeper-postgres:
        condition: service_healthy
    networks:
      - cartracker-net

  lakekeeper:
    # Pinned tagged release per Q6 of the Gate A/B plan: avoid `:latest-main`
    # and avoid the old/wrong `quay.io/lakekeeper/lakekeeper` repository.
    image: ${LAKEKEEPER_IMAGE:-quay.io/lakekeeper/catalog:v0.13.1}
    container_name: cartracker-lakekeeper
    command: ["serve"]
    environment:
      LAKEKEEPER__PG_ENCRYPTION_KEY: ${LAKEKEEPER_PG_ENCRYPTION_KEY}
      LAKEKEEPER__PG_DATABASE_URL_READ: postgresql://lakekeeper:${LAKEKEEPER_DB_PASSWORD}@lakekeeper-postgres:5432/lakekeeper
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgresql://lakekeeper:${LAKEKEEPER_DB_PASSWORD}@lakekeeper-postgres:5432/lakekeeper
      LAKEKEEPER__AUTHZ_BACKEND: allowall
      # A1 stands the catalog up only; storage-profile/warehouse registration
      # against MinIO happens starting in A2 when Spark actually writes
      # tables. These are carried here so the runbook's warehouse-registration
      # step has what it needs without a second env surface later.
      LAKEKEEPER_MINIO_ENDPOINT: http://minio:9000
      LAKEKEEPER_MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      LAKEKEEPER_MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    depends_on:
      lakekeeper-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/home/nonroot/lakekeeper", "healthcheck"]
      interval: 5s
      timeout: 10s
      retries: 36
      start_period: 5s
    networks:
      - cartracker-net

  # Gate A2: PySpark one-shot runner, mirroring the `snapshot-worker` pattern
  # in the main docker-compose.yml. Profile-gated so `docker compose -f
  # docker-compose.lakehouse.yml up` (no profile) never launches it --
  # invoke explicitly via `docker compose ... run --rm lakehouse-worker ...`.
  # The read-only `analytics_db` mount (A3, VM/local-manual rehearsal against
  # the real int_listing_volatility_features table) lives in the separate
  # docker-compose.lakehouse.a3.yml override, not here -- this base file is
  # also what the CI `lakehouse` job runs A2 against, and a CI runner has no
  # such external volume to mount.
  lakehouse-worker:
    build:
      context: .
      dockerfile: lakehouse/Dockerfile
      target: lakehouse-worker
    image: cartracker-lakehouse
    profiles: ["lakehouse-worker"]
    mem_limit: 6g
    environment:
      # Plan 125 Gate 0.5: consumer-facing Spark/dbt scripts read the neutral
      # ICEBERG_CATALOG_URI (shared/iceberg_catalog.py::catalog_uri); a catalog
      # swap repoints this var, not the scripts. LAKEKEEPER_CATALOG_URI stays
      # set alongside it because this same worker also runs the Lakekeeper-
      # specific provisioning script (scripts/register_lakehouse_warehouse.py),
      # which addresses Lakekeeper's management API directly.
      #
      # The neutral var's fallback chain is nested rather than a plain default:
      # compose always populates the container's ICEBERG_CATALOG_URI, so
      # catalog_uri()'s own runtime fallback can never fire inside the worker.
      # Without the nesting, an existing A2/A3/A4 shell exporting only
      # LAKEKEEPER_CATALOG_URI at a non-default endpoint would be silently
      # ignored by consumers, which would still get the baked-in default. The
      # host-side fallback has to happen here, at interpolation time.
      ICEBERG_CATALOG_URI: ${ICEBERG_CATALOG_URI:-${LAKEKEEPER_CATALOG_URI:-http://lakekeeper:8181/catalog}}
      LAKEKEEPER_CATALOG_URI: ${LAKEKEEPER_CATALOG_URI:-http://lakekeeper:8181/catalog}
      ICEBERG_WAREHOUSE_NAME: cartracker_experiments
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: bronze
    networks:
      - cartracker-net
    depends_on:
      lakekeeper:
        condition: service_started

volumes:
  lakekeeper_pgdata:

networks:
  cartracker-net:
    external: true
