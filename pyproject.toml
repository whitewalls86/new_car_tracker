[tool.ruff]
target-version = 'py313'
line-length = 100
exclude = [
    "dbt_packages",
    "dbt/target",
    "target",
    "__pycache__",
    ".venv",
    "test/__pycache__"
]

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
markers = [
    "integration: tests that require a real Postgres database",
]
