# Auto-loaded by Docker Compose for production use.
# Adds host port mappings for services that need browser/host access.
# Not loaded when using explicit -f flags (e.g. test commands).

services:
  n8n:
    environment:
      - N8N_HOST=localhost
      - N8N_PROTOCOL=http
      - N8N_PATH=/

  scraper:
    ports:
      - "8000:8000"

  dbt_runner:
    ports:
      - "8081:8080"

  pgadmin:
    environment:
      PGADMIN_CONFIG_AUTHENTICATION_SOURCES: "['internal']"
      PGADMIN_CONFIG_WEBSERVER_REMOTE_USER: "''"
      SCRIPT_NAME: ""
