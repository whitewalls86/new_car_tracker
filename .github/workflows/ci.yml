name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check .

  unit-tests:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install test dependencies
        run: |
          pip install \
            pytest pytest-mock pytest-asyncio \
            fastapi httpx \
            psycopg2-binary asyncpg \
            requests pydantic jinja2 python-multipart \
            pyarrow \
            bs4 lxml \
            s3fs minio
      - run: pytest tests/ -v
        env:
          PYTHONPATH: ${{ github.workspace }}

  docker-build:
    name: Docker build (all services)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build

  dbt:
    name: dbt build + test
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cartracker
          POSTGRES_PASSWORD: cartracker
          POSTGRES_DB: cartracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Apply migrations (Flyway)
        uses: docker://flyway/flyway:10-alpine
        with:
          args: >-
            -url=jdbc:postgresql://localhost:5432/cartracker
            -user=cartracker
            -password=cartracker
            -locations=filesystem:/github/workspace/db/migrations
            migrate
        # Flyway action runs as a Docker container; /github/workspace is the
        # mounted repo checkout path used by GitHub Actions container steps.

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dbt
        run: pip install dbt-postgres

      - name: dbt build
        working-directory: dbt
        run: dbt build --profiles-dir . --target ci
        env:
          DBT_HOST: localhost
          DBT_PORT: "5432"
          DBT_USER: cartracker
          DBT_PASSWORD: cartracker
          DBT_DBNAME: cartracker