name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check .

  unit-tests:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install test dependencies
        run: |
          pip install \
            pytest pytest-mock pytest-asyncio \
            fastapi httpx \
            psycopg2-binary asyncpg \
            requests pydantic jinja2 python-multipart \
            pyarrow \
            bs4 lxml \
            s3fs minio \
            resend
      - run: pytest tests/ -v -m "not integration"
        env:
          PYTHONPATH: ${{ github.workspace }}
          LOG_PATH: /tmp/app.log

  docker-build:
    name: Docker build (all services)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build

  dbt:
    name: dbt build + test
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cartracker
          POSTGRES_PASSWORD: cartracker
          POSTGRES_DB: cartracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Apply migrations (Flyway)
        uses: docker://flyway/flyway:10-alpine
        with:
          args: >-
            -url=jdbc:postgresql://postgres:5432/cartracker
            -user=cartracker
            -password=cartracker
            -locations=filesystem:/github/workspace/db/migrations
            -detectEncoding=true
            -placeholders.viewerPassword=ci_viewer
            -placeholders.scraperPassword=ci_scraper
            -placeholders.dbtPassword=ci_dbt
            -placeholders.authEmailSalt=ci_salt
            -placeholders.adminEmail=ci@example.com
            -placeholders.airflowPassword=ci_airflow
            -placeholders.airflowAppPassword=ci_airflow_app
            migrate
        # Flyway runs as a Docker container step; it must reach the postgres
        # service by its service name ("postgres"), not localhost.

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dbt
        run: pip install dbt-postgres

      - name: Install dbt packages
        working-directory: dbt
        run: dbt deps

      - name: dbt build
        working-directory: dbt
        run: dbt build --profiles-dir . --target ci
        env:
          DBT_HOST: localhost
          DBT_PORT: "5432"
          DBT_USER: cartracker
          DBT_PASSWORD: cartracker
          DBT_DBNAME: cartracker

      - name: Install pytests
        run: pip install pytest psycopg2-binary

      - name: Run SQL smoke tests (Layer 1)
        run: pytest tests/integration/sql/ -v -m integration
        env:
          PYTHONPATH: ${{ github.workspace }}
          TEST_DATABASE_URL: postgresql://cartracker:cartracker@localhost:5432/cartracker
          DBT_HOST: localhost
          DBT_PORT: "5432"
          DBT_USER: cartracker
          DBT_PASSWORD: cartracker
          DBT_DBNAME: cartracker

      - name: Run dbt integration tests (Layer 2)
        run: pytest tests/integration/dbt/ -v -m integration
        env:
          PYTHONPATH: ${{ github.workspace }}
          TEST_DATABASE_URL: postgresql://cartracker:cartracker@localhost:5432/cartracker
          DBT_HOST: localhost
          DBT_PORT: "5432"
          DBT_USER: cartracker
          DBT_PASSWORD: cartracker
          DBT_DBNAME: cartracker

      - name: Install Layer 3 dependencies
        run: pip install fastapi httpx jinja2 python-multipart requests resend

      - name: Run API integration tests (Layer 3)
        run: pytest tests/integration/ops/ -v -m integration
        env:
          PYTHONPATH: ${{ github.workspace }}
          TEST_DATABASE_URL: postgresql://cartracker:cartracker@localhost:5432/cartracker
          LOG_PATH: /tmp/ops_test.log

      - name: Run Airflow integration tests
        run: pytest tests/integration/airflow/ -v -m integration
        env:
          PYTHONPATH: ${{ github.workspace }}
          TEST_DATABASE_URL: postgresql://cartracker:cartracker@localhost:5432/cartracker

      - name: Run Archiver integration tests
        run: pytest tests/integration/archiver/ -v -m integration
        env:
          PYTHONPATH: ${{ github.workspace }}
          TEST_DATABASE_URL: postgresql://cartracker:cartracker@localhost:5432/cartracker
