name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check .

  unit-tests:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        # No airflow/requirements.txt here: Airflow is a separate service image
        # in prod (airflow/Dockerfile) and no non-integration test imports it —
        # installing it alongside FastAPI here forces an incompatible starlette
        # downgrade (see the dbt job's isolated Airflow venv below).
        run: |
          pip install \
            -r requirements-dev.txt \
            -r scraper/requirements.txt \
            -r archiver/requirements.txt \
            -r processing/requirements.txt \
            -r ops/requirements.txt \
            -r dashboard/requirements.txt \
            -r dbt_runner/requirements.txt
      - run: pytest tests/ -v -m "not integration"
        env:
          PYTHONPATH: ${{ github.workspace }}
          LOG_PATH: /tmp/app.log

  docker-build:
    name: Docker build (all services)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build

  lakehouse:
    name: Lakehouse (Lakekeeper smoke + PySpark Iceberg round-trip)
    # Plan 112 Gate A: independent of the `dbt` job's GitHub Actions
    # `services:` blocks -- this job brings up its own self-contained
    # Compose stack (job-local MinIO + Lakekeeper + isolated Postgres) on
    # non-default ports, per docs/runbook_lakehouse.md. A2 adds the heavier
    # PySpark + Iceberg-Spark-runtime + iceberg-aws-bundle (S3FileIO) round-
    # trip step (plan Sec 4.3): attempted here first per the plan's Q2
    # recommendation, run
    # through the same `lakehouse-worker` image/service the VM/runbook path
    # uses (built via Compose, not pip-installed on the bare runner) so CI
    # actually exercises lakehouse/Dockerfile and the real operating path;
    # move to VM/local-manual only if this step proves too slow/flaky.
    runs-on: ubuntu-latest
    needs: lint
    env:
      LAKEKEEPER_DB_PASSWORD: ci_lakekeeper
      LAKEKEEPER_PG_ENCRYPTION_KEY: ci_lakekeeper_encryption_key_0123456789
      MINIO_ROOT_USER: cartracker
      MINIO_ROOT_PASSWORD: cartracker123
    steps:
      - uses: actions/checkout@v4

      - name: Bring up Lakekeeper stack (standalone lakehouse Compose project)
        run: |
          docker compose \
            -f docker-compose.lakehouse.yml -f docker-compose.lakehouse.ci.yml \
            -p ci-lakehouse up -d minio lakekeeper-postgres lakekeeper

      - name: Wait for Lakekeeper + MinIO health
        run: |
          docker compose \
            -f docker-compose.lakehouse.yml -f docker-compose.lakehouse.ci.yml \
            -p ci-lakehouse ps
          timeout 60 bash -c 'until curl -sf http://localhost:19000/minio/health/live; do sleep 2; done'
          timeout 180 bash -c 'until [ "$(docker inspect -f "{{.State.Health.Status}}" cartracker-lakekeeper 2>/dev/null)" = "healthy" ]; do docker compose -f docker-compose.lakehouse.yml -f docker-compose.lakehouse.ci.yml -p ci-lakehouse ps; sleep 2; done'
          timeout 60 bash -c 'until curl -fsSL http://localhost:18181/management/v1/info >/dev/null; do sleep 2; done'

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt requests psycopg2-binary

      - name: Check compose catalog-URI interpolation (Plan 125 Gate 0.5)
        # Runs `docker compose config` only -- no stack needed, so it is cheap
        # and does not depend on the steps around it. Lives here rather than in
        # unit-tests because it needs the docker CLI and so carries the
        # integration marker, which that job deselects. Proves the
        # neutral/legacy catalog-URI fallback chain resolves as the config
        # contract claims, which a YAML-parsing test cannot.
        run: pytest tests/integration/lakehouse/test_compose_catalog_interpolation.py -v -m integration
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run Lakekeeper management info smoke test (A1)
        # A1 smoke only: Lakekeeper process + metadata-store boot and the
        # warehouse-free management info endpoint over plain HTTP. No Spark,
        # no PyIceberg -- those are the A2/A2b steps below.
        run: pytest tests/integration/lakehouse/test_lakekeeper_smoke.py -v -m integration
        env:
          PYTHONPATH: ${{ github.workspace }}
          LAKEKEEPER_BASE_URI: http://localhost:18181

      - name: Build lakehouse-worker image (A2)
        # Same image/Dockerfile the VM/runbook path uses -- building it here
        # (rather than pip-installing pyspark straight on the bare runner)
        # means CI actually catches a broken lakehouse/Dockerfile or jar pin,
        # not just a broken Python script.
        run: |
          docker compose \
            -f docker-compose.lakehouse.yml -f docker-compose.lakehouse.ci.yml \
            -p ci-lakehouse build lakehouse-worker

      - name: Create bronze bucket in the job-local MinIO
        # Unlike the VM/local stack (real minio, bronze bucket already
        # provisioned), this job's throwaway MinIO starts empty -- the
        # warehouse registration below fails with a 400 IO error otherwise.
        # Same one-off boto3 snippet the `dbt` job uses, pointed at this
        # job's published port.
        run: |
          python -c "
          import boto3
          from botocore.client import Config
          s3 = boto3.client('s3',
              endpoint_url='http://localhost:19000',
              aws_access_key_id='${{ env.MINIO_ROOT_USER }}',
              aws_secret_access_key='${{ env.MINIO_ROOT_PASSWORD }}',
              config=Config(signature_version='s3v4'),
              region_name='us-east-1')
          s3.create_bucket(Bucket='bronze')
          print('Created bucket: bronze')
          "

      - name: Register the cartracker_experiments warehouse (A2)
        # Iceberg REST /v1/config and namespace CRUD both need a registered
        # warehouse first (A1's documented limitation) -- idempotent, safe to
        # re-run. Runs inside lakehouse-worker, joined to the same Compose
        # network as lakekeeper/minio via container-DNS service names.
        run: |
          docker compose \
            -f docker-compose.lakehouse.yml -f docker-compose.lakehouse.ci.yml \
            -p ci-lakehouse run --rm lakehouse-worker \
            python -m scripts.register_lakehouse_warehouse

      - name: Run PySpark Iceberg round-trip (A2, budget-gated per plan Sec 4.3)
        run: |
          docker compose \
            -f docker-compose.lakehouse.yml -f docker-compose.lakehouse.ci.yml \
            -p ci-lakehouse run --rm lakehouse-worker \
            python -m scripts.spike_iceberg_lakehouse roundtrip

      - name: Teardown (safe -- standalone ci-lakehouse project only)
        if: always()
        run: |
          docker compose \
            -f docker-compose.lakehouse.yml -f docker-compose.lakehouse.ci.yml \
            -p ci-lakehouse down -v

  dbt:
    name: dbt build + test
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cartracker
          POSTGRES_PASSWORD: cartracker
          POSTGRES_DB: cartracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: cartracker
          MINIO_ROOT_PASSWORD: cartracker123
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        command: server /data

      loki:
        image: grafana/loki:2.9.8
        ports:
          - 3100:3100
        options: >-
          --health-cmd "wget -qO- http://localhost:3100/ready"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Apply migrations (Flyway)
        uses: docker://flyway/flyway:10-alpine
        with:
          args: >-
            -url=jdbc:postgresql://postgres:5432/cartracker
            -user=cartracker
            -password=cartracker
            -locations=filesystem:/github/workspace/db/migrations
            -detectEncoding=true
            -placeholders.viewerPassword=ci_viewer
            -placeholders.scraperPassword=ci_scraper
            -placeholders.dbtPassword=ci_dbt
            -placeholders.authEmailSalt=ci_salt
            -placeholders.adminEmail=ci@example.com
            -placeholders.airflowPassword=ci_airflow
            -placeholders.airflowAppPassword=ci_airflow_app
            -placeholders.metricsPassword=ci_metrics
            -defaultSchema=public
            migrate
        # Flyway runs as a Docker container step; it must reach the postgres
        # service by its service name ("postgres"), not localhost.

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        # No airflow/requirements.txt here: Airflow is a separate service image
        # in prod (airflow/Dockerfile) and is installed into its own isolated
        # venv below, right before the Airflow integration tests, so its
        # starlette/fastapi constraints never collide with the other services'.
        run: |
          pip install \
            -r requirements-dev.txt \
            -r scraper/requirements.txt \
            -r archiver/requirements.txt \
            -r processing/requirements.txt \
            -r ops/requirements.txt \
            -r dashboard/requirements.txt \
            -r dbt_runner/requirements.txt

      - name: Create MinIO bucket
        run: |
          python -c "
          import boto3
          from botocore.client import Config
          s3 = boto3.client('s3',
              endpoint_url='http://localhost:9000',
              aws_access_key_id='cartracker',
              aws_secret_access_key='cartracker123',
              config=Config(signature_version='s3v4'),
              region_name='us-east-1')
          s3.create_bucket(Bucket='bronze')
          print('Created bucket: bronze')
          "

      - name: Install dbt
        # Pinned to match dbt_runner/Dockerfile — dbt 1.10 supports data_tests.arguments; avoids dbt 2.x prerelease.
        run: pip install "dbt-core==1.10.20" "dbt-postgres==1.10.2" "dbt-duckdb==1.10.1"

      - name: Install dbt packages
        working-directory: dbt
        run: dbt deps

      - name: Install DuckDB extensions
        run: python -c "import duckdb; con = duckdb.connect(); con.install_extension('httpfs'); con.install_extension('postgres_scanner')"

      - name: Seed MinIO with empty Parquet schemas (required for dbt unit test compilation)
        run: |
          python -c "
          import io
          import boto3
          import pyarrow as pa
          import pyarrow.parquet as pq
          from botocore.client import Config

          s3 = boto3.client('s3',
              endpoint_url='http://localhost:9000',
              aws_access_key_id='cartracker',
              aws_secret_access_key='cartracker123',
              config=Config(signature_version='s3v4'),
              region_name='us-east-1')

          def upload_empty(key, schema):
              buf = io.BytesIO()
              pq.write_table(pa.table({f.name: pa.array([], type=f.type) for f in schema}, schema=schema), buf)
              buf.seek(0)
              s3.put_object(Bucket='bronze', Key=key, Body=buf.getvalue())
              print(f'Uploaded {key}')

          upload_empty('silver_normalized/observations/source=srp/obs_year=2026/obs_month=1/seed.parquet', pa.schema([
              pa.field('artifact_id', pa.int64()),
              pa.field('listing_id', pa.string()),
              pa.field('vin', pa.string()),
              pa.field('canonical_detail_url', pa.string()),
              pa.field('source', pa.string()),
              pa.field('listing_state', pa.string()),
              pa.field('fetched_at', pa.timestamp('us', tz='UTC')),
              pa.field('written_at', pa.timestamp('us', tz='UTC')),
              pa.field('price', pa.int32()),
              pa.field('make', pa.string()),
              pa.field('model', pa.string()),
              pa.field('trim', pa.string()),
              pa.field('year', pa.int16()),
              pa.field('mileage', pa.int32()),
              pa.field('msrp', pa.int32()),
              pa.field('stock_type', pa.string()),
              pa.field('fuel_type', pa.string()),
              pa.field('body_style', pa.string()),
              pa.field('dealer_name', pa.string()),
              pa.field('dealer_zip', pa.string()),
              pa.field('customer_id', pa.string()),
              pa.field('seller_id', pa.string()),
              pa.field('dealer_street', pa.string()),
              pa.field('dealer_city', pa.string()),
              pa.field('dealer_state', pa.string()),
              pa.field('dealer_phone', pa.string()),
              pa.field('dealer_website', pa.string()),
              pa.field('dealer_cars_com_url', pa.string()),
              pa.field('dealer_rating', pa.float32()),
              pa.field('financing_type', pa.string()),
              pa.field('seller_zip', pa.string()),
              pa.field('seller_customer_id', pa.string()),
              pa.field('page_number', pa.int16()),
              pa.field('position_on_page', pa.int16()),
              pa.field('trid', pa.string()),
              pa.field('isa_context', pa.string()),
              pa.field('body', pa.string()),
              pa.field('condition', pa.string()),
              pa.field('obs_year', pa.int32()),
              pa.field('obs_month', pa.int32()),
              pa.field('obs_day', pa.int32()),
          ]))

          schema = pa.schema([
              pa.field('event_id', pa.int64()),
              pa.field('listing_id', pa.string()),
              pa.field('vin', pa.string()),
              pa.field('price', pa.int32()),
              pa.field('make', pa.string()),
              pa.field('model', pa.string()),
              pa.field('artifact_id', pa.int64()),
              pa.field('event_type', pa.string()),
              pa.field('source', pa.string()),
              pa.field('event_at', pa.timestamp('us', tz='UTC')),
              pa.field('year', pa.int32()),
              pa.field('month', pa.int32()),
          ])
          from datetime import datetime, timezone
          row = {
              # event_id=0: outside the 1-8 range used by the Plan 120 lake-snapshot
              # fixture's price_observation_events rows (scripts/seed_lake_snapshot_fixture.py),
              # so unique_stg_price_events_event_id doesn't collide across the two seeds.
              'event_id': pa.array([0], type=pa.int64()),
              'listing_id': pa.array(['CI_SEED_L1'], type=pa.string()),
              'vin': pa.array(['1HGBH41JXMN109186'], type=pa.string()),
              'price': pa.array([25000], type=pa.int32()),
              'make': pa.array(['Honda'], type=pa.string()),
              'model': pa.array(['Civic'], type=pa.string()),
              'artifact_id': pa.array([1], type=pa.int64()),
              'event_type': pa.array(['upserted'], type=pa.string()),
              'source': pa.array(['srp'], type=pa.string()),
              'event_at': pa.array([datetime(2026, 1, 1, tzinfo=timezone.utc)], type=pa.timestamp('us', tz='UTC')),
              'year': pa.array([2026], type=pa.int32()),
              'month': pa.array([1], type=pa.int32()),
          }
          buf = io.BytesIO()
          pq.write_table(pa.table(row, schema=schema), buf)
          buf.seek(0)
          s3.put_object(Bucket='bronze', Key='ops_normalized/price_observation_events/year=2026/month=1/seed.parquet', Body=buf.getvalue())
          print('Uploaded ops_normalized/price_observation_events/year=2026/month=1/seed.parquet')

          upload_empty('ops_normalized/blocked_cooldown_events/year=2026/month=1/seed.parquet', pa.schema([
              pa.field('event_id', pa.int64()),
              pa.field('listing_id', pa.string()),
              pa.field('event_type', pa.string()),
              pa.field('num_of_attempts', pa.int32()),
              pa.field('event_at', pa.timestamp('us', tz='UTC')),
              pa.field('year', pa.int32()),
              pa.field('month', pa.int32()),
          ]))
          "

      - name: Seed lake snapshot fixture data
        # Uploads the shared Plan 120 lake-snapshot fixture (known business-state
        # scenarios across all four source tables) so the dbt build below
        # materializes int_listing_state_runs/int_latest_observation against real
        # data, and so the archiver selector/cohort integration tests have
        # production-shaped Parquet to run their SQL against. Written under the
        # reserved 2099 partition so it never collides with the empty-schema
        # compilation seed above.
        run: python scripts/seed_lake_snapshot_fixture.py
        env:
          PYTHONPATH: ${{ github.workspace }}
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ROOT_USER: cartracker
          MINIO_ROOT_PASSWORD: cartracker123
          MINIO_BUCKET: bronze

      - name: dbt build (DuckDB — empty data compilation check)
        working-directory: dbt
        run: dbt build --profiles-dir . --target duckdb
        env:
          DUCKDB_PATH: /tmp/ci_analytics.duckdb
          POSTGRES_URL: postgresql://cartracker:cartracker@localhost:5432/cartracker
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ROOT_USER: cartracker
          MINIO_ROOT_PASSWORD: cartracker123
          MINIO_BUCKET: bronze

      - name: Run SQL smoke tests (Layer 1)
        run: pytest tests/integration/sql/ -v -m integration
        env:
          PYTHONPATH: ${{ github.workspace }}
          TEST_DATABASE_URL: postgresql://cartracker:cartracker@localhost:5432/cartracker
          TEST_VIEWER_DATABASE_URL: postgresql://viewer:ci_viewer@localhost:5432/cartracker
          DUCKDB_PATH: /tmp/ci_analytics.duckdb

      - name: Run API integration tests (Layer 3)
        run: pytest tests/integration/ops/ -v -m integration
        env:
          PYTHONPATH: ${{ github.workspace }}
          TEST_DATABASE_URL: postgresql://cartracker:cartracker@localhost:5432/cartracker
          LOG_PATH: /tmp/ops_test.log

      - name: Install Airflow test dependencies (isolated venv)
        # Isolated from the "Install dependencies" step above: apache-airflow's
        # starlette/fastapi constraints conflict with the FastAPI services', so
        # it gets its own venv here, pinned to match airflow/Dockerfile's base
        # image tag, mirroring how Airflow is its own container in prod.
        run: |
          python -m venv /tmp/airflow-venv
          /tmp/airflow-venv/bin/pip install "apache-airflow==3.2.0" -r airflow/requirements.txt pytest psycopg2-binary requests

      - name: Run Airflow integration tests
        run: /tmp/airflow-venv/bin/pytest tests/integration/airflow/ -v -m integration
        env:
          PYTHONPATH: ${{ github.workspace }}/airflow/dags
          TEST_DATABASE_URL: postgresql://cartracker:cartracker@localhost:5432/cartracker
          AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////tmp/airflow.db
          AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      - name: Run Archiver integration tests
        run: pytest tests/integration/archiver/ -v -m integration
        env:
          PYTHONPATH: ${{ github.workspace }}
          TEST_DATABASE_URL: postgresql://cartracker:cartracker@localhost:5432/cartracker
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ROOT_USER: cartracker
          MINIO_ROOT_PASSWORD: cartracker123
          MINIO_BUCKET: bronze

      - name: Run selector/dbt equivalence tests
        # Compares the real dbt build above against the Plan 120 selector SQL
        # over the same MinIO data — the coupling guard requested in Gate B
        # review (not a hand-copied paraphrase of the dbt logic).
        run: pytest tests/integration/dbt/ -v -m integration
        env:
          PYTHONPATH: ${{ github.workspace }}
          DUCKDB_PATH: /tmp/ci_analytics.duckdb
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ROOT_USER: cartracker
          MINIO_ROOT_PASSWORD: cartracker123
          MINIO_BUCKET: bronze

      - name: Run dbt_runner integration tests
        run: pytest tests/integration/dbt_runner/ -v -m integration
        env:
          PYTHONPATH: ${{ github.workspace }}
          DUCKDB_PATH: /tmp/ci_dbt_runner_test.duckdb
          POSTGRES_URL: postgresql://cartracker:cartracker@localhost:5432/cartracker
          LOG_PATH: /tmp/dbt_runner_test.log

