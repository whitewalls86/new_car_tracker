# oauth2-proxy configuration for cartracker.info
# Provider: Google OAuth
# Mode: forward_auth sidecar (Caddy handles actual proxying)

provider = "google"

# Allow any Google account to authenticate.
# Authorization (which routes they can reach) is enforced by Caddy using
# the X-Auth-Request-Email header that oauth2-proxy sets on the response.
email_domains = ["*"]

# Redirect back here after Google auth
redirect_url = "https://cartracker.info/oauth2/callback"

# Sidecar mode: upstream is irrelevant, but required by the binary.
# Caddy never actually proxies through oauth2-proxy; it only calls
# /oauth2/auth as a forward_auth subrequest.
upstreams = ["static://202"]

# Server
http_address = "0.0.0.0:4180"

# Cookie settings
cookie_name     = "_oauth2_proxy"
cookie_secure   = true
cookie_domains  = [".cartracker.info"]
cookie_expire   = "168h"   # 7 days; re-login weekly

# Credentials — injected from environment at runtime (see docker-compose.yml)
# client_id     = set via OAUTH2_PROXY_CLIENT_ID env var
# client_secret = set via OAUTH2_PROXY_CLIENT_SECRET env var
# cookie_secret = set via OAUTH2_PROXY_COOKIE_SECRET env var

# Tell oauth2-proxy to set X-Auth-Request-Email and X-Auth-Request-User
# on the response to /oauth2/auth. Caddy passes these to upstream services.
set_xauthrequest = true

# Skip the intermediate "Sign in" button page — redirect straight to Google.
skip_provider_button = true

# Standard logging
standard_logging = true
request_logging  = true
auth_logging     = true
