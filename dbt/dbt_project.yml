name: cartracker
version: "1.0"
config-version: 2

profile: cartracker

on-run-start:
  # register_upstream_external_models() ships with dbt-duckdb and registers
  # each source's meta.external_location as a view. It does not exist on other
  # adapters, so guard it by target type -- the Plan 125 Gate A `spark` target
  # would otherwise fail at on-run-start with an unknown-macro error before
  # running a single model. Spark resolves the same sources through the
  # parquet_source() macro instead (dbt/macros/parquet_source.sql).
  - "{% if target.type == 'duckdb' %}{{ register_upstream_external_models() }}{% endif %}"

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

vars:
  staleness_window_days: 3
  # Plan 123 Phase 2: late-arrival lookback for int_listing_state_fingerprints'
  # incremental scan. On incremental runs, source rows are rescanned from
  # max(target.fetched_at) minus this many days, so late-arriving or corrected
  # detail artifacts inside the window are still picked up.
  fingerprint_incremental_lookback_days: 3
  # Plan 123 Phase 2b: late-arrival lookback for int_listing_observation_fingerprints'
  # incremental scan (the all-source detail/SRP/carousel base layer). On
  # incremental runs, source rows are rescanned from max(target.fetched_at)
  # minus this many days, so late-arriving or corrected observations across
  # all three sources are still picked up.
  listing_observation_fingerprint_lookback_days: 3
  # Plan 123 Phase 3: late-arrival lookback for int_price_history's affected-VIN
  # incremental scan. On an incremental run, a VIN is "affected" (and its
  # complete price history reread/recomputed) if it has a price event at or
  # after max(target.last_seen_at) minus this many days.
  price_history_incremental_lookback_days: 3
  # Plan 123 Phase 4: late-arrival lookback for int_listing_state_runs'
  # affected-VIN incremental scan. On an incremental run, a vin17 is "affected"
  # (and all its runs recomputed) if it has a fingerprint at or after
  # max(target.run_ended_at) minus this many days.
  listing_state_runs_incremental_lookback_days: 3
  # Plan 123 Phase 5: late-arrival lookback for mart_scrape_volume's
  # affected-hour incremental scan. On an incremental run, an (hour, source)
  # is "affected" (and its aggregates fully recomputed) if it has a
  # stg_observations row with fetched_at at or after max(target.hour) minus
  # this many hours.
  scrape_volume_incremental_lookback_hours: 72
  # Plan 123 Phase 5: late-arrival lookback for int_latest_observation's
  # affected-VIN incremental scan. On an incremental run, a vin17 is
  # "affected" (and its ENTIRE observation history reread/reranked, since
  # source-priority means an older detail row can beat a newer SRP/carousel
  # one) if it has a stg_observations row with fetched_at at or after
  # max(target.fetched_at) minus this many days.
  latest_observation_incremental_lookback_days: 3
  # Plan 123 final modeling correction: late-arrival lookback for
  # int_listing_observation_runs' affected-listing_id incremental scan (the
  # all-source, listing_id-grain counterpart to int_listing_state_runs). On an
  # incremental run, a listing_id is "affected" (and all its runs recomputed)
  # if it has an observation fingerprint at or after max(target.run_ended_at)
  # minus this many days.
  listing_observation_runs_incremental_lookback_days: 3

models:
  cartracker:
    +materialized: view

    marts:
      +materialized: table
    ops:
      +schema: ops
      +materialized: view
