version: 2

models:
  - name: stg_detail_observations
    description: "Staging view over public.detail_observations with explicit columns and constraint-mirroring tests."

    columns:
      - name: id
      - name: artifact_id
      - name: fetched_at
      - name: listing_id
      - name: vin
      - name: vin17
        description: "Cleaned VIN, used for tracking vehicle across listings"
        data_tests:
          - valid_vin_nullable

      - name: artifact_id
      - name: fetched_at
      - name: listing_state
      - name: make
      - name: model
      - name: vehicle_trim
        description: "Renamed from 'trim' in source"
      - name: model_year
        description: "Renamed from 'year' in source"
      - name: price
      - name: mileage
      - name: msrp
      - name: stock_type
      - name: fuel_type
      - name: body_style
      - name: dealer_name
      - name: dealer_zip
      - name: customer_id
      - name: canonical_detail_url
        description: "URL we fetched for this observation"