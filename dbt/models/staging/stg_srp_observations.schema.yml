version: 2

models:
  - name: stg_srp_observations
    description: "Staging model for public.srp_observations with explicit columns and light cleanup. Docs in Source"
    columns:
      - name: id
      - name: artifact_id #FK raw_artifacts
      - name: run_id #FK runs
      - name: fetched_at
      - name: listing_id
      - name: vin
      - name: vin17
        description: "Cleaned and validated VIN used for tracking cars across listings"
        data_tests:
          - valid_vin_nullable
      - name: seller_customer_id
      - name: price
      - name: msrp
      - name: mileage
      - name: model_year
        description: "Renamed from 'year' in source"
      - name: make
      - name: model
      - name: vehicle_trim
        description: "Renamed from 'trim' in source"
      - name: stock_type
      - name: fuel_type
      - name: body_style
      - name: financing_type
      - name: seller_zip
      - name: page_number
      - name: position_on_page
      - name: trid
      - name: isa_context
      - name: canonical_detail_url
      - name: raw_vehicle_json
      - name: created_at

    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ['artifact_id', 'listing_id']