version: 2

models:
  - name: stg_observations
    description: >
      Unified view of all parsed observations from the MinIO silver layer.
      One row per artifact observation — SRP cards, detail pages, and carousel items.
      vin17 is null when the raw VIN is absent, not 17 characters, or fails the
      ^[A-Z0-9]{17}$ format check. Most columns are nullable because observation
      completeness varies by source type.
    config:
      tags: ["hourly_core"]
    columns:
      - name: source
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['srp', 'detail', 'carousel']
      - name: dealer_city
        description: City of the dealer — passed through from silver, populated for detail source only.
      - name: dealer_state
        description: State abbreviation of the dealer — passed through from silver, populated for detail source only.
      - name: body
        description: Carousel-only body-style text, distinct from the detail/SRP body_style field.
      - name: condition
        description: Carousel-only vehicle condition (e.g. new/used) text.
      - name: written_at
        description: >
          Timestamp the row was written to silver — distinct from fetched_at
          (when the listing was observed). Used by int_listing_observation_fingerprints
          to break ties between rows that share a fetched_at (e.g. a reprocessing
          correction of an already-fetched artifact).
