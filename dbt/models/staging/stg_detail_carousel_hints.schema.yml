version: 2

models:
  - name: stg_detail_carousel_hints
    description: "Staging materialized table over public.detail_carousel_hints with explicit columns"

    columns:
      - name: id
      - name: artifact_id
      - name: fetched_at
      - name: listing_id
      - name: price
      - name: mileage
      - name: body
      - name: condition
      - name: year

    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ['artifact_id', 'listing_id']