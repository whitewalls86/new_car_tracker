unit_tests:

  # ---------------------------------------------------------------------------
  # stg_dealers — arg_max aggregation
  # ---------------------------------------------------------------------------

  - name: test_dealers_most_recent_attributes_win
    description: "arg_max picks dealer name/zip from the most recent observation"
    model: stg_dealers
    given:
      - input: ref('int_latest_observation')
        rows:
          - {customer_id: "DEALER1", dealer_name: "Old Name", dealer_zip: "11111",
             fetched_at: "2026-01-01 12:00:00+00"}
          - {customer_id: "DEALER1", dealer_name: "New Name", dealer_zip: "22222",
             fetched_at: "2026-01-10 12:00:00+00"}
    expect:
      rows:
        - {customer_id: "DEALER1", name: "New Name", zip: "22222"}

  - name: test_dealers_null_customer_id_excluded
    description: "Rows with null customer_id are excluded"
    model: stg_dealers
    given:
      - input: ref('int_latest_observation')
        rows:
          - {customer_id: null, dealer_name: "No ID Dealer", dealer_zip: "33333",
             fetched_at: "2026-01-10 12:00:00+00"}
          - {customer_id: "DEALER1", dealer_name: "Has ID", dealer_zip: "44444",
             fetched_at: "2026-01-10 12:00:00+00"}
    expect:
      rows:
        - {customer_id: "DEALER1", name: "Has ID", zip: "44444"}

  # ---------------------------------------------------------------------------
  # stg_blocked_cooldown_events — pass-through from source
  # ---------------------------------------------------------------------------

  - name: test_blocked_cooldown_events_pass_through
    description: "All columns from the source pass through unchanged"
    model: stg_blocked_cooldown_events
    given:
      - input: source('ops_events', 'blocked_cooldown_events')
        columns:
          - {name: event_id,        data_type: bigint}
          - {name: listing_id,      data_type: varchar}
          - {name: event_type,      data_type: varchar}
          - {name: num_of_attempts, data_type: integer}
          - {name: event_at,        data_type: timestamptz}
          - {name: year,            data_type: integer}
          - {name: month,           data_type: integer}
        rows:
          - {event_id: 1, listing_id: "L001", event_type: "blocked",
             num_of_attempts: 1, event_at: "2026-01-10 12:00:00+00"}
          - {event_id: 2, listing_id: "L001", event_type: "incremented",
             num_of_attempts: 2, event_at: "2026-01-11 12:00:00+00"}
    expect:
      rows:
        - {event_id: 1, listing_id: "L001", event_type: "blocked",    num_of_attempts: 1}
        - {event_id: 2, listing_id: "L001", event_type: "incremented", num_of_attempts: 2}
