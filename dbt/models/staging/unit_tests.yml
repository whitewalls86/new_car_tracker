unit_tests:

  # ---------------------------------------------------------------------------
  # stg_observations — vin17 derivation
  # ---------------------------------------------------------------------------

  - name: test_vin17_valid_17_char_uppercased
    description: "A valid 17-character alphanumeric VIN is uppercased into vin17"
    model: stg_observations
    given:
      - input: source('silver', 'observations')
        rows:
          - {artifact_id: 1, listing_id: "L1", source: "srp", listing_state: "active",
             fetched_at: "2026-01-10 12:00:00+00", vin: "1hgbh41jxmn109186"}
    expect:
      rows:
        - {listing_id: "L1", vin17: "1HGBH41JXMN109186"}

  - name: test_vin17_null_when_too_short
    description: "A VIN shorter than 17 characters produces vin17=null"
    model: stg_observations
    given:
      - input: source('silver', 'observations')
        rows:
          - {artifact_id: 1, listing_id: "L1", source: "srp", listing_state: "active",
             fetched_at: "2026-01-10 12:00:00+00", vin: "SHORT123"}
    expect:
      rows:
        - {listing_id: "L1", vin17: null}

  - name: test_vin17_null_when_vin_null
    description: "A null VIN produces vin17=null"
    model: stg_observations
    given:
      - input: source('silver', 'observations')
        rows:
          - {artifact_id: 1, listing_id: "L1", source: "srp", listing_state: "active",
             fetched_at: "2026-01-10 12:00:00+00", vin: null}
    expect:
      rows:
        - {listing_id: "L1", vin17: null}

  - name: test_vin17_null_when_invalid_chars
    description: "A 17-char VIN with invalid characters (I, O, Q) produces vin17=null"
    model: stg_observations
    given:
      - input: source('silver', 'observations')
        rows:
          - {artifact_id: 1, listing_id: "L1", source: "srp", listing_state: "active",
             fetched_at: "2026-01-10 12:00:00+00", vin: "1HGBH41JXMN10918!"}
    expect:
      rows:
        - {listing_id: "L1", vin17: null}

  # ---------------------------------------------------------------------------
  # stg_price_events — filtering
  # ---------------------------------------------------------------------------

  - name: test_price_events_filters_null_vin
    description: "Rows with null VIN are excluded"
    model: stg_price_events
    given:
      - input: source('ops_events', 'price_observation_events')
        rows:
          - {event_id: 1, listing_id: "L1", vin: null, price: 10000,
             artifact_id: 1, event_type: "upserted", source: "srp",
             event_at: "2026-01-10 12:00:00+00"}
          - {event_id: 2, listing_id: "L2", vin: "VALIDVIN000000001", price: 20000,
             artifact_id: 2, event_type: "upserted", source: "srp",
             event_at: "2026-01-10 12:00:00+00"}
    expect:
      rows:
        - {event_id: 2, vin: "VALIDVIN000000001", price: 20000}

  - name: test_price_events_filters_deleted
    description: "Rows with event_type='deleted' are excluded"
    model: stg_price_events
    given:
      - input: source('ops_events', 'price_observation_events')
        rows:
          - {event_id: 1, listing_id: "L1", vin: "VALIDVIN000000001", price: 10000,
             artifact_id: 1, event_type: "deleted", source: "srp",
             event_at: "2026-01-10 12:00:00+00"}
          - {event_id: 2, listing_id: "L2", vin: "VALIDVIN000000002", price: 20000,
             artifact_id: 2, event_type: "upserted", source: "srp",
             event_at: "2026-01-10 12:00:00+00"}
    expect:
      rows:
        - {event_id: 2, vin: "VALIDVIN000000002", price: 20000}

  - name: test_price_events_filters_zero_price
    description: "Rows with price=0 are excluded"
    model: stg_price_events
    given:
      - input: source('ops_events', 'price_observation_events')
        rows:
          - {event_id: 1, listing_id: "L1", vin: "VALIDVIN000000001", price: 0,
             artifact_id: 1, event_type: "upserted", source: "srp",
             event_at: "2026-01-10 12:00:00+00"}
          - {event_id: 2, listing_id: "L2", vin: "VALIDVIN000000002", price: 25000,
             artifact_id: 2, event_type: "upserted", source: "srp",
             event_at: "2026-01-10 12:00:00+00"}
    expect:
      rows:
        - {event_id: 2, vin: "VALIDVIN000000002", price: 25000}

  - name: test_price_events_filters_null_price
    description: "Rows with null price are excluded"
    model: stg_price_events
    given:
      - input: source('ops_events', 'price_observation_events')
        rows:
          - {event_id: 1, listing_id: "L1", vin: "VALIDVIN000000001", price: null,
             artifact_id: 1, event_type: "upserted", source: "srp",
             event_at: "2026-01-10 12:00:00+00"}
    expect:
      rows: []

  # ---------------------------------------------------------------------------
  # stg_dealers — arg_max aggregation
  # ---------------------------------------------------------------------------

  - name: test_dealers_most_recent_attributes_win
    description: "arg_max picks dealer name/zip from the most recent observation"
    model: stg_dealers
    given:
      - input: ref('int_latest_observation')
        rows:
          - {customer_id: "DEALER1", dealer_name: "Old Name", dealer_zip: "11111",
             fetched_at: "2026-01-01 12:00:00+00"}
          - {customer_id: "DEALER1", dealer_name: "New Name", dealer_zip: "22222",
             fetched_at: "2026-01-10 12:00:00+00"}
    expect:
      rows:
        - {customer_id: "DEALER1", name: "New Name", zip: "22222"}

  - name: test_dealers_null_customer_id_excluded
    description: "Rows with null customer_id are excluded"
    model: stg_dealers
    given:
      - input: ref('int_latest_observation')
        rows:
          - {customer_id: null, dealer_name: "No ID Dealer", dealer_zip: "33333",
             fetched_at: "2026-01-10 12:00:00+00"}
          - {customer_id: "DEALER1", dealer_name: "Has ID", dealer_zip: "44444",
             fetched_at: "2026-01-10 12:00:00+00"}
    expect:
      rows:
        - {customer_id: "DEALER1", name: "Has ID", zip: "44444"}
