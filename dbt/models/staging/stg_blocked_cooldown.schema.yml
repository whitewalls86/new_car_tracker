version: 2

models:
  - name: stg_blocked_cooldown
    description: "Staging view over public.blocked_cooldown. Computes eligiblity for further attempts."

    columns:
      - name: listing_id
      - name: first_attempt_at
      - name: last_attempted_at
      - name: num_of_attempts
      - name: next_eligible_at
        description: "Computed next eligible at, based on number of attempts, NULL if fully blocked"
      - name: fully_blocked
        description: "Boolean set to true if 5 attemtps have been made and all failed."