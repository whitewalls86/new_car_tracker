version: 2

models:
  - name: mart_inventory_coverage
    description: >
      Enrichment coverage by make/model. A VIN is enriched when its best observation
      comes from a detail scrape (source='detail'). SRP-only VINs have make/model/price
      but lack trim, mileage, and other attributes. Used by the data health dashboard.
    columns:
      - name: make
        data_tests:
          - not_null
      - name: model
        data_tests:
          - not_null
      - name: total_vins
        data_tests:
          - not_null
      - name: coverage_pct
        description: Percentage of VINs with a detail observation (0–100).

  - name: mart_cooldown_cohorts
    description: >
      403 cooldown backlog distribution. Shows how many listings are in exponential
      cooldown and at what attempt depth. Source: blocked_cooldown_events in MinIO.
    columns:
      - name: attempt_bucket
        data_tests:
          - not_null
          - unique
      - name: listing_count
        data_tests:
          - not_null

  - name: mart_detail_batch_outcomes
    description: >
      Daily detail scrape extraction yield. extraction_yield is the fraction of
      detail observations with a valid 17-char VIN. Low yield days signal parser
      failures or page structure changes. Replaces recent_detail_runs.sql.
    columns:
      - name: obs_date
        data_tests:
          - not_null
          - unique
      - name: extraction_yield
        description: Percentage of observations with a valid VIN (0–100).

  - name: mart_scrape_volume
    description: >
      Hourly scrape throughput by source type (srp, detail, carousel).
      artifact_count is distinct artifacts processed in the hour; observation_count
      is total parsed rows. vin_extraction_pct is populated for detail rows only.
      One row per (hour, source).
    columns:
      - name: hour
        data_tests:
          - not_null
      - name: source
        data_tests:
          - not_null
      - name: artifact_count
        data_tests:
          - not_null

  - name: mart_block_rate
    description: >
      Hourly 403 blocking events. new_blocks counts first-time blocks; block_increments
      counts repeated attempts on already-blocked listings. Join to mart_scrape_volume
      on hour to compute a block rate against total observations.
      One row per hour.
    columns:
      - name: hour
        data_tests:
          - not_null
          - unique

  - name: mart_price_freshness_trend
    description: >
      Price freshness distribution by make/model. Shows how current price data is
      for each tracked make/model combination. Used to detect under-scraped segments.
      Replaces price_freshness.sql (which read from the deprecated ops_vehicle_staleness view).
    columns:
      - name: make
        data_tests:
          - not_null
      - name: model
        data_tests:
          - not_null
      - name: fresh_lt_7d_pct
        description: Percentage of VINs with a price observation in the last 7 days (0–100).
