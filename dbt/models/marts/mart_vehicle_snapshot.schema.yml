version: 2

models:
  - name: mart_vehicle_snapshot
    description: >
      Current state snapshot: one row per VIN. Combines latest observation
      attributes with current price and price history. listing_state is
      authoritative from detail observations, inferred for SRP-only VINs.
    columns:
      - name: vin
        data_tests:
          - not_null
          - unique
      - name: listing_state
        data_tests:
          - not_null
          - accepted_values:
              values: ['active', 'unlisted']
      - name: make
      - name: model
      - name: price
        description: Current price from the price observation event stream.
