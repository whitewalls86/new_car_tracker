  - name: test_unlisted_excluded_from_deal_scores
    description: "Unlisted VINs are excluded from deal scores (WHERE listing_state='active')"
    model: mart_deal_scores
    given:
      - input: ref('mart_vehicle_snapshot')
        rows:
          - {vin: "UNLISTEDVIN000001", listing_id: "L1", make: "honda", model: "crv",
             listing_state: "unlisted", price: 30000, msrp: null,
             price_observed_at: "2026-01-10 12:00:00+00",
             first_price: 30000, min_price: 30000, max_price: 30000,
