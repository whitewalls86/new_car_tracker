  - name: test_unlisted_detail_overrides_srp_state
    description: >
      Most recent obs is detail/unlisted with NULL make (Cars.com 'no longer listed' page).
      int_latest_observation returns the prior SRP obs (has make/model) for vehicle attrs.
      listing_state must still be 'unlisted' from the detail obs — not inferred from SRP recency.
    model: mart_vehicle_snapshot
    given:
      - input: ref('int_latest_observation')
        rows:
          # SRP row is the best data-rich obs (detail obs had NULL make, filtered by int_latest_observation)
          - {vin17: "UNLISTEDDTL00001", listing_id: "L1", source: "srp",
             listing_state: null, make: "honda", model: "crv",
             fetched_at: "2026-01-10 12:00:00+00"}
      - input: ref('int_price_history')
        rows:
          - {vin: "UNLISTEDDTL00001", current_price: 30000, price_observed_at: "2026-01-10 12:00:00+00",
             first_price: 30000, min_price: 30000, max_price: 30000,
             price_drop_count: 0, price_increase_count: 0, total_price_observations: 1,
             first_seen_at: "2026-01-05 12:00:00+00",
             last_seen_at: "2026-04-24 12:00:00+00"}
      - input: ref('int_active_make_models')
        rows:
          - {make: "honda", model: "crv"}
      - input: ref('stg_observations')
        format: sql
        rows: |
          select cast(null as bigint) as artifact_id,
                 cast(null as string) as listing_id,
                 cast('detail' as string) as source,
                 cast('unlisted' as string) as listing_state,
                 cast('2026-04-25 10:00:00+00' as timestamp) as fetched_at,
                 cast(null as timestamp) as written_at,
                 cast(null as string) as vin,
                 cast('UNLISTEDDTL00001' as string) as vin17,
                 cast(null as integer) as price,
                 cast(null as string) as make,
                 cast(null as string) as model,
                 cast(null as string) as vehicle_trim,
                 cast(null as smallint) as model_year,
                 cast(null as integer) as mileage,
                 cast(null as integer) as msrp,
                 cast(null as string) as stock_type,
                 cast(null as string) as fuel_type,
                 cast(null as string) as body_style,
                 cast(null as string) as dealer_name,
                 cast(null as string) as dealer_zip,
                 cast(null as string) as dealer_city,
                 cast(null as string) as dealer_state,
                 cast(null as string) as customer_id,
                 cast(null as string) as canonical_detail_url,
                 cast(null as string) as financing_type,
                 cast(null as string) as seller_zip,
                 cast(null as string) as seller_customer_id,
                 cast(null as smallint) as page_number,
                 cast(null as smallint) as position_on_page,
                 cast(null as string) as trid,
                 cast(null as string) as isa_context,
                 cast(null as string) as body,
                 cast(null as string) as condition
          union all select null, null, 'srp', null, cast('2026-01-10 12:00:00+00' as timestamp), null, null, 'UNLISTEDDTL00001', null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null
    expect:
      rows:
        - {vin: "UNLISTEDDTL00001", listing_state: "unlisted"}

