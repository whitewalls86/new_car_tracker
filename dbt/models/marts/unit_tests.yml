unit_tests:

  # ---------------------------------------------------------------------------
  # mart_vehicle_snapshot — listing_state inference
  # ---------------------------------------------------------------------------

  - name: test_detail_explicit_active_state
    description: "Detail observation with listing_state='active' passes through unchanged"
    model: mart_vehicle_snapshot
    given:
      - input: ref('int_latest_observation')
        rows:
          - {vin17: "DETAIL0ACTIVE00001", listing_id: "L1", source: "detail",
             listing_state: "active", make: "honda", model: "crv",
             fetched_at: "2026-01-10 12:00:00+00"}
      - input: ref('int_price_history')
        rows:
          - {vin: "DETAIL0ACTIVE00001", current_price: 30000, price_observed_at: "2026-01-10 12:00:00+00",
             first_price: 30000, min_price: 30000, max_price: 30000,
             price_drop_count: 0, price_increase_count: 0, total_price_observations: 1,
             first_seen_at: "2026-01-10 12:00:00+00", last_seen_at: "2026-01-10 12:00:00+00",
             days_on_market: 0}
      - input: ref('int_active_make_models')
        rows:
          - {make: "honda", model: "crv"}
    expect:
      rows:
        - {vin: "DETAIL0ACTIVE00001", listing_state: "active"}

  - name: test_srp_only_recent_inferred_active
    description: "SRP-only VIN last seen within 7 days is inferred as 'active'"
    model: mart_vehicle_snapshot
    given:
      - input: ref('int_latest_observation')
        rows:
          - {vin17: "SRPONLY0RECENT0001", listing_id: "L1", source: "srp",
             listing_state: null, make: "honda", model: "crv",
             fetched_at: "2026-01-10 12:00:00+00"}
      - input: ref('int_price_history')
        rows:
          - {vin: "SRPONLY0RECENT0001", current_price: 30000, price_observed_at: "2026-01-10 12:00:00+00",
             first_price: 30000, min_price: 30000, max_price: 30000,
             price_drop_count: 0, price_increase_count: 0, total_price_observations: 1,
             first_seen_at: "2026-01-05 12:00:00+00",
             last_seen_at: "{{ modules.datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S+00') }}",
             days_on_market: 5}
      - input: ref('int_active_make_models')
        rows:
          - {make: "honda", model: "crv"}
    expect:
      rows:
        - {vin: "SRPONLY0RECENT0001", listing_state: "active"}

  - name: test_srp_only_old_inferred_unlisted
    description: "SRP-only VIN last seen over 7 days ago is inferred as 'unlisted'"
    model: mart_vehicle_snapshot
    given:
      - input: ref('int_latest_observation')
        rows:
          - {vin17: "SRPONLY00000OLD001", listing_id: "L1", source: "srp",
             listing_state: null, make: "honda", model: "crv",
             fetched_at: "2025-12-01 12:00:00+00"}
      - input: ref('int_price_history')
        rows:
          - {vin: "SRPONLY00000OLD001", current_price: 30000, price_observed_at: "2025-12-01 12:00:00+00",
             first_price: 30000, min_price: 30000, max_price: 30000,
             price_drop_count: 0, price_increase_count: 0, total_price_observations: 1,
             first_seen_at: "2025-12-01 12:00:00+00", last_seen_at: "2025-12-01 12:00:00+00",
             days_on_market: 40}
      - input: ref('int_active_make_models')
        rows:
          - {make: "honda", model: "crv"}
    expect:
      rows:
        - {vin: "SRPONLY00000OLD001", listing_state: "unlisted"}

  - name: test_no_price_history_still_produces_row
    description: "VIN with observation but no price history still appears (left join)"
    model: mart_vehicle_snapshot
    given:
      - input: ref('int_latest_observation')
        rows:
          - {vin17: "NOPRICEHIST000001", listing_id: "L1", source: "srp",
             listing_state: null, make: "honda", model: "crv",
             fetched_at: "2026-01-10 12:00:00+00"}
      - input: ref('int_price_history')
        rows: []
      - input: ref('int_active_make_models')
        rows:
          - {make: "honda", model: "crv"}
    expect:
      rows:
        - {vin: "NOPRICEHIST000001", price: null, listing_state: "unlisted"}

  # ---------------------------------------------------------------------------
  # mart_deal_scores — scoring and tier assignment
  # ---------------------------------------------------------------------------

  - name: test_deal_tier_excellent_above_70
    description: "A VIN with score >= 70 gets deal_tier='excellent'"
    model: mart_deal_scores
    given:
      - input: ref('mart_vehicle_snapshot')
        rows:
          - {vin: "EXCELLENT00000001", listing_id: "DL1", make: "honda", model: "crv",
             listing_state: "active", price: 35000, msrp: 50000,
             price_observed_at: "2026-01-10 12:00:00+00",
             first_price: 40000, min_price: 35000, max_price: 40000,
             price_drop_count: 2, price_increase_count: 0, total_price_observations: 3,
             first_seen_at: "2025-11-26 12:00:00+00", last_seen_at: "2026-01-10 12:00:00+00",
             days_on_market: 45, seller_customer_id: null, dealer_name: null, dealer_zip: null,
             vehicle_trim: "Hybrid", model_year: 2025, fuel_type: null, body_style: null,
             stock_type: null, canonical_detail_url: null, customer_id: null,
             last_observed_at: "2026-01-10 12:00:00+00", mileage: null}
          - {vin: "COHORT000000000V2", listing_id: "DL2", make: "honda", model: "crv",
             listing_state: "active", price: 45000, msrp: null,
             price_observed_at: "2026-01-10 12:00:00+00",
             first_price: 45000, min_price: 45000, max_price: 45000,
             price_drop_count: 0, price_increase_count: 0, total_price_observations: 1,
             first_seen_at: "2026-01-09 12:00:00+00", last_seen_at: "2026-01-10 12:00:00+00",
             days_on_market: 1, seller_customer_id: null, dealer_name: null, dealer_zip: null,
             vehicle_trim: "Hybrid", model_year: 2025, fuel_type: null, body_style: null,
             stock_type: null, canonical_detail_url: null, customer_id: null,
             last_observed_at: "2026-01-10 12:00:00+00", mileage: null}
          - {vin: "COHORT000000000V3", listing_id: "DL3", make: "honda", model: "crv",
             listing_state: "active", price: 50000, msrp: null,
             price_observed_at: "2026-01-10 12:00:00+00",
             first_price: 50000, min_price: 50000, max_price: 50000,
             price_drop_count: 0, price_increase_count: 0, total_price_observations: 1,
             first_seen_at: "2026-01-09 12:00:00+00", last_seen_at: "2026-01-10 12:00:00+00",
             days_on_market: 1, seller_customer_id: null, dealer_name: null, dealer_zip: null,
             vehicle_trim: "Hybrid", model_year: 2025, fuel_type: null, body_style: null,
             stock_type: null, canonical_detail_url: null, customer_id: null,
             last_observed_at: "2026-01-10 12:00:00+00", mileage: null}
          - {vin: "COHORT000000000V4", listing_id: "DL4", make: "honda", model: "crv",
             listing_state: "active", price: 55000, msrp: null,
             price_observed_at: "2026-01-10 12:00:00+00",
             first_price: 55000, min_price: 55000, max_price: 55000,
             price_drop_count: 0, price_increase_count: 0, total_price_observations: 1,
             first_seen_at: "2026-01-09 12:00:00+00", last_seen_at: "2026-01-10 12:00:00+00",
             days_on_market: 1, seller_customer_id: null, dealer_name: null, dealer_zip: null,
             vehicle_trim: "Hybrid", model_year: 2025, fuel_type: null, body_style: null,
             stock_type: null, canonical_detail_url: null, customer_id: null,
             last_observed_at: "2026-01-10 12:00:00+00", mileage: null}
          - {vin: "COHORT000000000V5", listing_id: "DL5", make: "honda", model: "crv",
             listing_state: "active", price: 60000, msrp: null,
             price_observed_at: "2026-01-10 12:00:00+00",
             first_price: 60000, min_price: 60000, max_price: 60000,
             price_drop_count: 0, price_increase_count: 0, total_price_observations: 1,
             first_seen_at: "2026-01-09 12:00:00+00", last_seen_at: "2026-01-10 12:00:00+00",
             days_on_market: 1, seller_customer_id: null, dealer_name: null, dealer_zip: null,
             vehicle_trim: "Hybrid", model_year: 2025, fuel_type: null, body_style: null,
             stock_type: null, canonical_detail_url: null, customer_id: null,
             last_observed_at: "2026-01-10 12:00:00+00", mileage: null}
      - input: ref('int_benchmarks')
        rows:
          - {make: "honda", model: "crv", national_listing_count: 5,
             national_avg_price: 49000, national_median_price: 50000,
             national_p10_price: 37000, national_p25_price: 45000,
             national_p75_price: 55000, national_p90_price: 58000,
             national_avg_discount_pct: null}
      - input: ref('stg_dealers')
        rows: []
    expect:
      rows:
        - {vin: "EXCELLENT00000001", deal_tier: "excellent"}
        - {vin: "COHORT000000000V2", deal_tier: "good"}
        - {vin: "COHORT000000000V3", deal_tier: "good"}
        - {vin: "COHORT000000000V4", deal_tier: "fair"}
        - {vin: "COHORT000000000V5", deal_tier: "fair"}

  - name: test_msrp_discount_pct
    description: "MSRP discount is correctly calculated as (msrp - price) / msrp * 100"
    model: mart_deal_scores
    given:
      - input: ref('mart_vehicle_snapshot')
        rows:
          - {vin: "MSRPDISC000000001", listing_id: "L1", make: "honda", model: "crv",
             listing_state: "active", price: 35000, msrp: 50000,
             price_observed_at: "2026-01-10 12:00:00+00",
             first_price: 35000, min_price: 35000, max_price: 35000,
             price_drop_count: 0, price_increase_count: 0, total_price_observations: 1,
             first_seen_at: "2026-01-10 12:00:00+00", last_seen_at: "2026-01-10 12:00:00+00",
             days_on_market: 0, seller_customer_id: null, dealer_name: null, dealer_zip: null,
             vehicle_trim: null, model_year: null, fuel_type: null, body_style: null,
             stock_type: null, canonical_detail_url: null, customer_id: null,
             last_observed_at: "2026-01-10 12:00:00+00", mileage: null}
      - input: ref('int_benchmarks')
        rows:
          - {make: "honda", model: "crv", national_listing_count: 1,
             national_avg_price: 35000, national_median_price: 35000,
             national_p10_price: 35000, national_p25_price: 35000,
             national_p75_price: 35000, national_p90_price: 35000,
             national_avg_discount_pct: null}
      - input: ref('stg_dealers')
        rows: []
    expect:
      rows:
        - {vin: "MSRPDISC000000001", msrp_discount_pct: 30.00}

  - name: test_deal_score_in_bounds
    description: "Deal score is always between 0 and 100"
    model: mart_deal_scores
    given:
      - input: ref('mart_vehicle_snapshot')
        rows:
          - {vin: "BOUNDS0000000001A", listing_id: "L1", make: "honda", model: "crv",
             listing_state: "active", price: 1000, msrp: 100000,
             price_observed_at: "2026-01-10 12:00:00+00",
             first_price: 50000, min_price: 1000, max_price: 50000,
             price_drop_count: 10, price_increase_count: 0, total_price_observations: 11,
             first_seen_at: "2025-06-01 12:00:00+00", last_seen_at: "2026-01-10 12:00:00+00",
             days_on_market: 200, seller_customer_id: null, dealer_name: null, dealer_zip: null,
             vehicle_trim: null, model_year: null, fuel_type: null, body_style: null,
             stock_type: null, canonical_detail_url: null, customer_id: null,
             last_observed_at: "2026-01-10 12:00:00+00", mileage: null}
          - {vin: "BOUNDS0000000002B", listing_id: "L2", make: "honda", model: "crv",
             listing_state: "active", price: 99000, msrp: null,
             price_observed_at: "2026-01-10 12:00:00+00",
             first_price: 99000, min_price: 99000, max_price: 99000,
             price_drop_count: 0, price_increase_count: 0, total_price_observations: 1,
             first_seen_at: "2026-01-10 12:00:00+00", last_seen_at: "2026-01-10 12:00:00+00",
             days_on_market: 0, seller_customer_id: null, dealer_name: null, dealer_zip: null,
             vehicle_trim: null, model_year: null, fuel_type: null, body_style: null,
             stock_type: null, canonical_detail_url: null, customer_id: null,
             last_observed_at: "2026-01-10 12:00:00+00", mileage: null}
      - input: ref('int_benchmarks')
        rows:
          - {make: "honda", model: "crv", national_listing_count: 2,
             national_avg_price: 50000, national_median_price: 50000,
             national_p10_price: 1000, national_p25_price: 25000,
             national_p75_price: 75000, national_p90_price: 99000,
             national_avg_discount_pct: null}
      - input: ref('stg_dealers')
        rows: []
    expect:
      rows:
        - {vin: "BOUNDS0000000001A"}
        - {vin: "BOUNDS0000000002B"}

  - name: test_unlisted_excluded_from_deal_scores
    description: "Unlisted VINs are excluded from deal scores (WHERE listing_state='active')"
    model: mart_deal_scores
    given:
      - input: ref('mart_vehicle_snapshot')
        rows:
          - {vin: "UNLISTEDVIN000001", listing_id: "L1", make: "honda", model: "crv",
             listing_state: "unlisted", price: 30000, msrp: null,
             price_observed_at: "2026-01-10 12:00:00+00",
             first_price: 30000, min_price: 30000, max_price: 30000,
             price_drop_count: 0, price_increase_count: 0, total_price_observations: 1,
             first_seen_at: "2025-12-01 12:00:00+00", last_seen_at: "2025-12-01 12:00:00+00",
             days_on_market: 40, seller_customer_id: null, dealer_name: null, dealer_zip: null,
             vehicle_trim: null, model_year: null, fuel_type: null, body_style: null,
             stock_type: null, canonical_detail_url: null, customer_id: null,
             last_observed_at: "2025-12-01 12:00:00+00", mileage: null}
      - input: ref('int_benchmarks')
        rows: []
      - input: ref('stg_dealers')
        rows: []
    expect:
      rows: []

  # ---------------------------------------------------------------------------
  # mart_inventory_coverage — enrichment rate by make/model
  # ---------------------------------------------------------------------------

  - name: test_coverage_all_detail
    description: "All VINs with source='detail' → coverage_pct=100, srp_only=0"
    model: mart_inventory_coverage
    given:
      - input: ref('int_latest_observation')
        rows:
          - {vin17: "DETAIL0VIN0000001", make: "honda", model: "crv", source: "detail"}
          - {vin17: "DETAIL0VIN0000002", make: "honda", model: "crv", source: "detail"}
    expect:
      rows:
        - {make: "honda", model: "crv", total_vins: 2, detail_enriched: 2, srp_only: 0, coverage_pct: 100.0}

  - name: test_coverage_all_srp
    description: "All VINs with source='srp' → coverage_pct=0, detail_enriched=0"
    model: mart_inventory_coverage
    given:
      - input: ref('int_latest_observation')
        rows:
          - {vin17: "SRPONLY0VIN000001", make: "honda", model: "crv", source: "srp"}
          - {vin17: "SRPONLY0VIN000002", make: "honda", model: "crv", source: "srp"}
    expect:
      rows:
        - {make: "honda", model: "crv", total_vins: 2, detail_enriched: 0, srp_only: 2, coverage_pct: 0.0}

  - name: test_coverage_mixed_fifty_pct
    description: "1 detail + 1 SRP for the same make/model → coverage_pct=50.0"
    model: mart_inventory_coverage
    given:
      - input: ref('int_latest_observation')
        rows:
          - {vin17: "MIXEDCOVDET000001", make: "honda", model: "crv", source: "detail"}
          - {vin17: "MIXEDCOVSRP000001", make: "honda", model: "crv", source: "srp"}
    expect:
      rows:
        - {make: "honda", model: "crv", total_vins: 2, detail_enriched: 1, srp_only: 1, coverage_pct: 50.0}

  - name: test_coverage_null_make_excluded
    description: "Rows with null make are excluded from coverage"
    model: mart_inventory_coverage
    given:
      - input: ref('int_latest_observation')
        rows:
          - {vin17: "NULLMAKEVIN000001", make: null, model: "crv", source: "detail"}
          - {vin17: "GOODMAKEVIN000001", make: "honda", model: "crv", source: "detail"}
    expect:
      rows:
        - {make: "honda", model: "crv", total_vins: 1}

  # ---------------------------------------------------------------------------
  # mart_cooldown_cohorts — 403 backlog bucket assignment
  # ---------------------------------------------------------------------------

  - name: test_cooldown_bucket_3_to_5
    description: "A listing with 4 attempts falls into the '3-5' bucket"
    model: mart_cooldown_cohorts
    given:
      - input: ref('stg_blocked_cooldown_events')
        rows:
          - {listing_id: "L001", num_of_attempts: 4, event_at: "2026-01-10 12:00:00+00"}
    expect:
      rows:
        - {attempt_bucket: "3-5", listing_count: 1}

  - name: test_cooldown_bucket_11_plus
    description: "A listing with 15 attempts falls into the '11+' bucket"
    model: mart_cooldown_cohorts
    given:
      - input: ref('stg_blocked_cooldown_events')
        rows:
          - {listing_id: "L001", num_of_attempts: 15, event_at: "2026-01-10 12:00:00+00"}
    expect:
      rows:
        - {attempt_bucket: "11+", listing_count: 1}

  - name: test_cooldown_latest_event_wins
    description: "Two events for the same listing — the one with the higher event_at determines the attempt count"
    model: mart_cooldown_cohorts
    given:
      - input: ref('stg_blocked_cooldown_events')
        rows:
          - {listing_id: "L001", num_of_attempts: 2, event_at: "2026-01-09 12:00:00+00"}
          - {listing_id: "L001", num_of_attempts: 7, event_at: "2026-01-10 12:00:00+00"}
    expect:
      rows:
        - {attempt_bucket: "6-10", listing_count: 1}

  - name: test_cooldown_two_listings_same_bucket
    description: "Two distinct listings both at 1 attempt → listing_count=2 in bucket '1'"
    model: mart_cooldown_cohorts
    given:
      - input: ref('stg_blocked_cooldown_events')
        rows:
          - {listing_id: "L001", num_of_attempts: 1, event_at: "2026-01-10 12:00:00+00"}
          - {listing_id: "L002", num_of_attempts: 1, event_at: "2026-01-10 12:00:00+00"}
    expect:
      rows:
        - {attempt_bucket: "1", listing_count: 2}

  # ---------------------------------------------------------------------------
  # mart_detail_batch_outcomes — extraction yield per day
  # ---------------------------------------------------------------------------

  - name: test_batch_yield_all_valid
    description: "All detail observations have a valid vin17 → extraction_yield=100.0"
    model: mart_detail_batch_outcomes
    given:
      - input: ref('stg_observations')
        rows:
          - {source: "detail", fetched_at: "2026-01-10 10:00:00+00", artifact_id: 1, vin17: "VALIDVIN00000001"}
          - {source: "detail", fetched_at: "2026-01-10 11:00:00+00", artifact_id: 1, vin17: "VALIDVIN00000002"}
    expect:
      rows:
        - {obs_date: "2026-01-10", detail_observations: 2, valid_vin_count: 2,
           unique_vins_enriched: 2, extraction_yield: 100.0}

  - name: test_batch_yield_partial
    description: "1 of 2 observations has a valid vin17 → extraction_yield=50.0"
    model: mart_detail_batch_outcomes
    given:
      - input: ref('stg_observations')
        rows:
          - {source: "detail", fetched_at: "2026-01-10 10:00:00+00", artifact_id: 1, vin17: "VALIDVIN00000001"}
          - {source: "detail", fetched_at: "2026-01-10 11:00:00+00", artifact_id: 1, vin17: null}
    expect:
      rows:
        - {obs_date: "2026-01-10", detail_observations: 2, valid_vin_count: 1,
           extraction_yield: 50.0}

  - name: test_batch_non_detail_excluded
    description: "SRP observations are excluded — only source='detail' counts"
    model: mart_detail_batch_outcomes
    given:
      - input: ref('stg_observations')
        rows:
          - {source: "srp",    fetched_at: "2026-01-10 10:00:00+00", artifact_id: 1, vin17: "SRPVIN000000001"}
          - {source: "detail", fetched_at: "2026-01-10 11:00:00+00", artifact_id: 2, vin17: "DETAILVIN000001"}
    expect:
      rows:
        - {obs_date: "2026-01-10", detail_observations: 1, valid_vin_count: 1}

  - name: test_batch_groups_by_day
    description: "Observations on two distinct days produce two rows"
    model: mart_detail_batch_outcomes
    given:
      - input: ref('stg_observations')
        rows:
          - {source: "detail", fetched_at: "2026-01-10 10:00:00+00", artifact_id: 1, vin17: "VALIDVIN00000001"}
          - {source: "detail", fetched_at: "2026-01-11 10:00:00+00", artifact_id: 2, vin17: "VALIDVIN00000002"}
    expect:
      rows:
        - {obs_date: "2026-01-10"}
        - {obs_date: "2026-01-11"}

  # ---------------------------------------------------------------------------
  # mart_price_freshness_trend — freshness bucket assignment
  # ---------------------------------------------------------------------------

  - name: test_freshness_no_price_history_goes_stale
    description: "VIN with no price history (left join miss) → counted in stale_gt_14d, fresh_lt_7d_pct=0"
    model: mart_price_freshness_trend
    given:
      - input: ref('int_latest_observation')
        rows:
          - {vin17: "NOPRICEHIST000001", make: "honda", model: "crv"}
      - input: ref('int_price_history')
        rows: []
    expect:
      rows:
        - {make: "honda", model: "crv", total_vins: 1, stale_gt_14d: 1, fresh_lt_7d_pct: 0.0}

  - name: test_freshness_old_price_goes_stale
    description: "VIN with a very old price observation → counted in stale_gt_14d"
    model: mart_price_freshness_trend
    given:
      - input: ref('int_latest_observation')
        rows:
          - {vin17: "STALEVIN00000001", make: "honda", model: "crv"}
      - input: ref('int_price_history')
        rows:
          - {vin: "STALEVIN00000001", price_observed_at: "2025-01-01 12:00:00+00"}
    expect:
      rows:
        - {make: "honda", model: "crv", stale_gt_14d: 1, fresh_lt_1d: 0, fresh_lt_7d_pct: 0.0}

  - name: test_freshness_current_price_is_fresh
    description: "VIN with a price observed right now → counted in fresh_lt_1d, fresh_lt_7d_pct=100"
    model: mart_price_freshness_trend
    given:
      - input: ref('int_latest_observation')
        rows:
          - {vin17: "FRESHVIN00000001", make: "honda", model: "crv"}
      - input: ref('int_price_history')
        rows:
          - {vin: "FRESHVIN00000001",
             price_observed_at: "{{ modules.datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S+00') }}"}
