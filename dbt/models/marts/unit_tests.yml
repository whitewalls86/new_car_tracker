unit_tests:

  # ---------------------------------------------------------------------------
  # mart_vehicle_snapshot — listing_state inference
  # ---------------------------------------------------------------------------

  - name: test_detail_explicit_active_state
    description: "Detail observation with listing_state='active' passes through unchanged"
    model: mart_vehicle_snapshot
    given:
      - input: ref('int_latest_observation')
        rows:
          - {vin17: "DETAIL0ACTIVE00001", listing_id: "L1", source: "detail",
             listing_state: "active", make: "honda", model: "crv",
             fetched_at: "2026-01-10 12:00:00+00"}
      - input: ref('int_price_history')
        rows:
          - {vin: "DETAIL0ACTIVE00001", current_price: 30000, price_observed_at: "2026-01-10 12:00:00+00",
             first_price: 30000, min_price: 30000, max_price: 30000,
             price_drop_count: 0, price_increase_count: 0, total_price_observations: 1,
             first_seen_at: "2026-01-10 12:00:00+00", last_seen_at: "2026-01-10 12:00:00+00",
             days_on_market: 0}
    expect:
      rows:
        - {vin: "DETAIL0ACTIVE00001", listing_state: "active"}

  - name: test_srp_only_recent_inferred_active
    description: "SRP-only VIN last seen within 7 days is inferred as 'active'"
    model: mart_vehicle_snapshot
    given:
      - input: ref('int_latest_observation')
        rows:
          - {vin17: "SRPONLY0RECENT0001", listing_id: "L1", source: "srp",
             listing_state: null, make: "honda", model: "crv",
             fetched_at: "2026-01-10 12:00:00+00"}
      - input: ref('int_price_history')
        rows:
          - {vin: "SRPONLY0RECENT0001", current_price: 30000, price_observed_at: "2026-01-10 12:00:00+00",
             first_price: 30000, min_price: 30000, max_price: 30000,
             price_drop_count: 0, price_increase_count: 0, total_price_observations: 1,
             first_seen_at: "2026-01-05 12:00:00+00",
             last_seen_at: "{{ modules.datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S+00') }}",
             days_on_market: 5}
    expect:
      rows:
        - {vin: "SRPONLY0RECENT0001", listing_state: "active"}

  - name: test_srp_only_old_inferred_unlisted
    description: "SRP-only VIN last seen over 7 days ago is inferred as 'unlisted'"
    model: mart_vehicle_snapshot
    given:
      - input: ref('int_latest_observation')
        rows:
          - {vin17: "SRPONLY00000OLD001", listing_id: "L1", source: "srp",
             listing_state: null, make: "honda", model: "crv",
             fetched_at: "2025-12-01 12:00:00+00"}
      - input: ref('int_price_history')
        rows:
          - {vin: "SRPONLY00000OLD001", current_price: 30000, price_observed_at: "2025-12-01 12:00:00+00",
             first_price: 30000, min_price: 30000, max_price: 30000,
             price_drop_count: 0, price_increase_count: 0, total_price_observations: 1,
             first_seen_at: "2025-12-01 12:00:00+00", last_seen_at: "2025-12-01 12:00:00+00",
             days_on_market: 40}
    expect:
      rows:
        - {vin: "SRPONLY00000OLD001", listing_state: "unlisted"}

  - name: test_no_price_history_still_produces_row
    description: "VIN with observation but no price history still appears (left join)"
    model: mart_vehicle_snapshot
    given:
      - input: ref('int_latest_observation')
        rows:
          - {vin17: "NOPRICEHIST000001", listing_id: "L1", source: "srp",
             listing_state: null, make: "honda", model: "crv",
             fetched_at: "2026-01-10 12:00:00+00"}
      - input: ref('int_price_history')
        rows: []
    expect:
      rows:
        - {vin: "NOPRICEHIST000001", price: null, listing_state: "unlisted"}

  # ---------------------------------------------------------------------------
  # mart_deal_scores — scoring and tier assignment
  # ---------------------------------------------------------------------------

  - name: test_deal_tier_excellent_above_70
    description: "A VIN with score >= 70 gets deal_tier='excellent'"
    model: mart_deal_scores
    given:
      - input: ref('mart_vehicle_snapshot')
