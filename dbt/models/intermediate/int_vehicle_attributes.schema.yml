version: 2

models:
  - name: int_vehicle_attributes
    description: Latest vehicle attributes per VIN — make, model, trim, year, msrp, seller info. Combines SRP and detail observation sources; freshest observation wins.
    columns:
      - name: vin
        data_tests:
          - not_null
          - unique
          - valid_vin
      - name: attributes_observed_at
        data_tests:
          - not_null
      - name: attributes_artifact_id
        data_tests:
          - not_null
          - relationships:
              to: source('public', 'raw_artifacts')
              field: artifact_id
      - name: attributes_source
        data_tests:
          - not_null
          - accepted_values:
              values: ['srp', 'detail']
