version: 2

models:
  - name: int_carousel_hints_filtered
    description: >
      Incrementally filtered carousel hints. Parses make/model from body text
      and flags whether the hint matches an active scrape target. Avoids
      re-scanning 7M+ rows on every build.
    columns:
      - name: id
        data_tests:
          - unique
          - not_null
      - name: listing_id
        data_tests:
          - not_null
      - name: price
      - name: is_valid_target
