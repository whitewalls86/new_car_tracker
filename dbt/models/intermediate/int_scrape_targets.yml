version: 1

models:
  - name: int_scrape_targets
    description: >
      Active scrape targets derived from search_configs joined to the
      scrape_targets seed for display-name resolution.  One row per
      enabled search_key with canonical make/model display names.
    columns:
      - name: search_key
        data_tests:
          - unique
          - not_null
      - name: make
        data_tests:
          - not_null
      - name: model
        data_tests:
          - not_null
