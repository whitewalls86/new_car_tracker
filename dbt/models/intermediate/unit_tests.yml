# Why the stg_* fixtures below are `format: sql` and not the (nicer) dict form
# -----------------------------------------------------------------------------
# Plan 125 Gate B (audit F16). dbt builds a DICT fixture by introspecting the
# mocked input's relation, to synthesize typed NULLs for columns the fixture
# doesn't mention (get_fixture_sql -> adapter.get_columns_in_relation). On the
# spark target stg_observations/stg_price_events are `ephemeral`, which NEVER
# materializes a relation at any point in a run -- so dbt raises
# "relation doesn't exist" at compile time and the test cannot run. On duckdb
# they are `view`s, which is why the dict form works there and this was easy to
# miss. dbt skips the introspection entirely for `format: sql`, so SQL fixtures
# work on both engines with no change to any model.
#
# Consequences to know before editing one:
#   * A SQL fixture must spell out EVERY column the model references -- the
#     auto-NULL fill is exactly what is being given up. stg_observations
#     fixtures therefore carry its full 33-column select list.
#   * Only the FIRST row of the union needs casts; it fixes the union's schema.
#   * Use `string`, never `varchar`: `cast(x as varchar)` is a parse error on
#     Spark (it demands a length), and `string` is DuckDB's VARCHAR alias.
#   * Fixtures mocking MATERIALIZED models (int_*) need none of this and stay
#     in the dict form, which is more readable. Only ephemeral inputs are affected.
#
# These tests are the executable spec for both engines until Gate E, and they
# run on both: 38/38 on spark, 64/64 on duckdb.

unit_tests:

  # ---------------------------------------------------------------------------
  # int_latest_observation — source priority + recency
  # ---------------------------------------------------------------------------

  - name: test_detail_wins_over_srp_same_vin
    description: "Detail observation wins over SRP for the same VIN (source priority)"
    model: int_latest_observation
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('stg_observations')
        format: sql
        rows: |
          select cast(1 as bigint) as artifact_id,
                 cast('L1' as string) as listing_id,
                 cast('srp' as string) as source,
                 cast(null as string) as listing_state,
                 cast('2026-01-10 14:00:00+00' as timestamp) as fetched_at,
                 cast(null as timestamp) as written_at,
                 cast(null as string) as vin,
                 cast('1HGBH41JXMN109186' as string) as vin17,
                 cast(null as integer) as price,
                 cast('SRP-Make' as string) as make,
                 cast(null as string) as model,
                 cast(null as string) as vehicle_trim,
                 cast(null as smallint) as model_year,
                 cast(null as integer) as mileage,
                 cast(null as integer) as msrp,
                 cast(null as string) as stock_type,
                 cast(null as string) as fuel_type,
                 cast(null as string) as body_style,
                 cast(null as string) as dealer_name,
                 cast(null as string) as dealer_zip,
                 cast(null as string) as dealer_city,
                 cast(null as string) as dealer_state,
                 cast(null as string) as customer_id,
                 cast(null as string) as canonical_detail_url,
                 cast(null as string) as financing_type,
                 cast(null as string) as seller_zip,
                 cast(null as string) as seller_customer_id,
                 cast(null as smallint) as page_number,
                 cast(null as smallint) as position_on_page,
                 cast(null as string) as trid,
                 cast(null as string) as isa_context,
                 cast(null as string) as body,
                 cast(null as string) as condition
          union all select 2, 'L1', 'detail', null, cast('2026-01-10 12:00:00+00' as timestamp), null, null, '1HGBH41JXMN109186', null, 'Detail-Make', null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null
    expect:
      rows:
        - {vin17: "1HGBH41JXMN109186", source: "detail", make: "Detail-Make"}

