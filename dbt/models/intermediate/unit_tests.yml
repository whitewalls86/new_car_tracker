  # ---------------------------------------------------------------------------
  # int_listing_volatility_features — feature row correctness
  # ---------------------------------------------------------------------------

  - name: test_volatility_features_state_history
    description: >
      1 VIN with 2 runs (closed L1 + open L2, both listing_state=active). Verifies
      total_state_changes, listing_id_change_count, days_since_last_state_change
      (as_of_at-pinned), unchanged_observation_streak, and price_change_count_7d=0.
      Inputs include a future price event and a future SRP row (both after as_of_at=2026-01-26)
      to confirm the <= as_of_at upper-bound filters exclude them.
    model: int_listing_volatility_features
    overrides:
      vars:
        as_of_at: "2026-01-26 00:00:00+00"
    given:
      - input: ref('int_listing_state_runs')
        rows:
          - {vin17: "VIN1", listing_id: "L1", parsed_fingerprint: "fp_a",
             listing_state: "active",
             run_started_at: "2026-01-10 00:00:00+00", run_ended_at: "2026-01-24 00:00:00+00",
             artifact_count: 1, run_duration_hours: 336, is_open_run: false,
             next_state_started_at: "2026-01-25 00:00:00+00", hours_until_change: 24}
          - {vin17: "VIN1", listing_id: "L2", parsed_fingerprint: "fp_b",
             listing_state: "active",
             run_started_at: "2026-01-25 00:00:00+00", run_ended_at: "2026-01-25 12:00:00+00",
             artifact_count: 2, run_duration_hours: 12, is_open_run: true,
             next_state_started_at: null, hours_until_change: null}
      - input: ref('stg_observations')
        format: sql
        rows: |
          select 'VIN1' as vin17, 'L2' as listing_id, 'detail' as source,
                 cast('2026-01-25 00:00:00+00' as timestamp) as fetched_at,
                 'D001' as customer_id, 'honda' as make, 'crv' as model
          union all select 'VIN1', 'L2', 'detail', cast('2026-01-25 12:00:00+00' as timestamp), 'D001', 'honda', 'crv'
          -- future SRP: must be excluded; days_since_srp_seen should remain null
          union all select 'VIN1', 'L2', 'srp', cast('2026-01-27 00:00:00+00' as timestamp), null, null, null
      - input: ref('stg_price_events')
        format: sql
        rows: |
          select 'VIN1' as vin, 30000 as price, cast('2026-01-01 00:00:00+00' as timestamp) as event_at
          -- future price event: genuine change (30000->28000), within 7d window if not filtered
          union all select 'VIN1', 28000, cast('2026-01-28 00:00:00+00' as timestamp)
      - input: ref('int_price_history')
        rows:
          - {vin: "VIN1", current_price: 30000,
             price_drop_count: 0, price_increase_count: 0,
             first_price: 30000, min_price: 30000, max_price: 30000,
             total_price_observations: 1}
      - input: ref('int_benchmarks')
        rows:
          - {make: "honda", model: "crv", national_listing_count: 1,
             national_avg_price: 25000, national_median_price: 25000,
             national_avg_discount_pct: null}
      - input: ref('int_listing_observation_runs')
        rows: []
    expect:
      rows:
        - {vin17: "VIN1", listing_id: "L2",
           total_state_changes: 1,
           listing_id_change_count: 2,
           days_since_last_state_change: 1,
           unchanged_observation_streak: 2,
           price_change_count_7d: 0,
           price_change_count_30d: 0,
           listing_state_change_count: 0,
           days_since_srp_seen: null,
           days_since_last_all_source_change: null,
           all_source_unchanged_observation_streak: 0,
           all_source_detail_observation_count: 0,
           all_source_srp_observation_count: 0,
           all_source_carousel_observation_count: 0,
           all_source_non_detail_refresh_seen: false}

  - name: test_volatility_features_price_windows_srp_and_priors
    description: >
      1 VIN with 3 runs (2 closed 12h+24h at D001/honda/crv, 1 open). Three price events
      28k→29k→30k. SRP at 2026-01-29. Verifies price_change_count_7d=1, price_change_count_30d=2,
      days_since_srp_seen=3, dealer_avg_run_length_hours=18.0, price_vs_make_model_median=1.2.
      Inputs include future rows after as_of_at=2026-02-01: a future price change (would push
      counts to 2/3), a future SRP fetch (would change days_since_srp_seen to -2), and a future
      detail observation with different make/model (would break price_vs_make_model_median if
      arg_max leaked it). Expected values confirm all three are excluded.
    model: int_listing_volatility_features
    overrides:
      vars:
        as_of_at: "2026-02-01 00:00:00+00"
    given:
      - input: ref('int_listing_state_runs')
        rows:
          - {vin17: "VIN2", listing_id: "L1", parsed_fingerprint: "fp_a",
             listing_state: "active",
             run_started_at: "2026-01-03 00:00:00+00", run_ended_at: "2026-01-03 12:00:00+00",
             artifact_count: 1, run_duration_hours: 12, is_open_run: false,
             next_state_started_at: "2026-01-10 00:00:00+00", hours_until_change: 156}
          - {vin17: "VIN2", listing_id: "L1", parsed_fingerprint: "fp_b",
             listing_state: "active",
             run_started_at: "2026-01-10 00:00:00+00", run_ended_at: "2026-01-11 00:00:00+00",
             artifact_count: 1, run_duration_hours: 24, is_open_run: false,
             next_state_started_at: "2026-01-25 00:00:00+00", hours_until_change: 336}
          - {vin17: "VIN2", listing_id: "L2", parsed_fingerprint: "fp_c",
             listing_state: "active",
             run_started_at: "2026-01-25 00:00:00+00", run_ended_at: "2026-01-29 00:00:00+00",
             artifact_count: 3, run_duration_hours: 96, is_open_run: true,
             next_state_started_at: null, hours_until_change: null}
      - input: ref('stg_observations')
        format: sql
        rows: |
          select 'VIN2' as vin17, 'L1' as listing_id, 'detail' as source,
                 cast('2026-01-03 00:00:00+00' as timestamp) as fetched_at,
                 'D001' as customer_id, 'honda' as make, 'crv' as model
          union all select 'VIN2', 'L1', 'detail', cast('2026-01-11 00:00:00+00' as timestamp), 'D001', 'honda', 'crv'
          union all select 'VIN2', 'L2', 'detail', cast('2026-01-25 00:00:00+00' as timestamp), 'D001', 'honda', 'crv'
          union all select 'VIN2', 'L2', 'srp',    cast('2026-01-29 00:00:00+00' as timestamp), null, null, null
          -- future SRP: must be excluded; days_since_srp_seen should stay 3, not become -2
          union all select 'VIN2', 'L2', 'srp',    cast('2026-02-03 00:00:00+00' as timestamp), null, null, null
          -- future detail with different make/model: arg_max must not pick this up;
          -- price_vs_make_model_median must stay 1.2 (honda/crv benchmark), not become null
          union all select 'VIN2', 'L2', 'detail', cast('2026-02-03 00:00:00+00' as timestamp), 'D002', 'toyota', 'rav4'
      - input: ref('stg_price_events')
        format: sql
        rows: |
          select 'VIN2' as vin, 28000 as price, cast('2026-01-03 00:00:00+00' as timestamp) as event_at
          union all select 'VIN2', 29000, cast('2026-01-10 00:00:00+00' as timestamp)
          union all select 'VIN2', 30000, cast('2026-01-28 00:00:00+00' as timestamp)
          -- future price change: would push 7d count to 2 and 30d count to 3 if not filtered
          union all select 'VIN2', 32000, cast('2026-02-05 00:00:00+00' as timestamp)
      - input: ref('int_price_history')
        rows:
          - {vin: "VIN2", current_price: 30000,
             price_drop_count: 0, price_increase_count: 2,
             first_price: 28000, min_price: 28000, max_price: 30000,
             total_price_observations: 3}
      - input: ref('int_benchmarks')
        rows:
          - {make: "honda", model: "crv", national_listing_count: 1,
             national_avg_price: 25000, national_median_price: 25000,
             national_avg_discount_pct: null}
      - input: ref('int_listing_observation_runs')
        rows: []
    expect:
      rows:
        - {vin17: "VIN2", listing_id: "L2",
           price_change_count_7d: 1,
           price_change_count_30d: 2,
           days_since_srp_seen: 3,
           dealer_avg_run_length_hours: 18.0,
           make_model_avg_run_length_hours: 18.0,
           price_vs_make_model_median: 1.2,
           days_since_last_all_source_change: null,
           all_source_unchanged_observation_streak: 0,
           all_source_detail_observation_count: 0,
           all_source_srp_observation_count: 0,
           all_source_carousel_observation_count: 0,
           all_source_non_detail_refresh_seen: false}

  - name: test_volatility_features_consumes_all_source_cadence_signal
