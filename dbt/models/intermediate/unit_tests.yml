  # ---------------------------------------------------------------------------
  # int_price_history — price drop/increase counting
  # ---------------------------------------------------------------------------

  - name: test_price_drop_and_increase_counts
    description: >
      Five price events: 100 -> 120 -> 90 -> 90 -> 110.
      Drops: 120->90 (1). Increases: 100->120, 90->110 (2). Flat: 90->90 (ignored).
    model: int_price_history
    overrides:
      macros:
        is_incremental: false
    given:
      # format: sql (not a dict) -- see the header comment at the top of this file.
      - input: ref('stg_price_events')
        format: sql
        rows: |
          select 'TEST00000000000V1' as vin, 100 as price, cast('2026-01-01 12:00:00+00' as timestamp) as event_at
          union all select 'TEST00000000000V1', 120, cast('2026-01-03 12:00:00+00' as timestamp)
          union all select 'TEST00000000000V1', 90,  cast('2026-01-05 12:00:00+00' as timestamp)
          union all select 'TEST00000000000V1', 90,  cast('2026-01-07 12:00:00+00' as timestamp)
          union all select 'TEST00000000000V1', 110, cast('2026-01-09 12:00:00+00' as timestamp)
    expect:
      rows:
        - {vin: "TEST00000000000V1", price_drop_count: 1, price_increase_count: 2,
           first_price: 100, min_price: 90, max_price: 120, current_price: 110,
           total_price_observations: 5}

  - name: test_single_observation_no_drops_or_increases
    description: "A single price event produces 0 drops and 0 increases"
    model: int_price_history
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('stg_price_events')
        format: sql
        rows: |
          select 'TEST00000000000V1' as vin, 25000 as price, cast('2026-01-10 12:00:00+00' as timestamp) as event_at
    expect:
      rows:
        - {vin: "TEST00000000000V1", price_drop_count: 0, price_increase_count: 0,
           first_price: 25000, current_price: 25000, min_price: 25000, max_price: 25000,
           total_price_observations: 1}

  - name: test_monotonic_drops
    description: "Three consecutive price drops: 50000 -> 45000 -> 40000"
    model: int_price_history
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('stg_price_events')
        format: sql
        rows: |
          select 'TEST00000000000V1' as vin, 50000 as price,
                 cast('2026-01-01 12:00:00+00' as timestamp) as event_at
          union all
          select 'TEST00000000000V1', 45000, cast('2026-01-05 12:00:00+00' as timestamp)
          union all
          select 'TEST00000000000V1', 40000, cast('2026-01-10 12:00:00+00' as timestamp)
    expect:
      rows:
        - {vin: "TEST00000000000V1", price_drop_count: 2, price_increase_count: 0,
           first_price: 50000, current_price: 40000}

  - name: test_multiple_vins_independent
    description: "Price history is computed independently per VIN"
    model: int_price_history
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('stg_price_events')
        format: sql
        rows: |
          select 'VIN0000000000001A' as vin, 100 as price, cast('2026-01-01 12:00:00+00' as timestamp) as event_at
          union all select 'VIN0000000000001A', 80,  cast('2026-01-05 12:00:00+00' as timestamp)
          union all select 'VIN0000000000002B', 200, cast('2026-01-01 12:00:00+00' as timestamp)
          union all select 'VIN0000000000002B', 250, cast('2026-01-05 12:00:00+00' as timestamp)
    expect:
      rows:
        - {vin: "VIN0000000000001A", price_drop_count: 1, price_increase_count: 0,
           current_price: 80}
        - {vin: "VIN0000000000002B", price_drop_count: 0, price_increase_count: 1,
           current_price: 250}

