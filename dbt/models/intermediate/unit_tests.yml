  # ---------------------------------------------------------------------------
  # int_listing_observation_runs — all-source gaps-and-islands, listing_id grain
  # ---------------------------------------------------------------------------

  - name: test_observation_runs_collapses_across_sources
    description: >
      One listing with detail + srp + carousel observations sharing the same
      price/mileage/listing_state collapses to a single run with per-source
      counts/flags set and vin17 resolved from the one row that has it — even
      though each row's underlying parsed_fingerprint differs by source, this
      model's own observation_state_key (price/mileage/listing_state only)
      correctly treats them as one unchanged-state run.
    model: int_listing_observation_runs
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('int_listing_observation_fingerprints')
        rows:
          - {listing_id: "L1", vin17: "1HGBH41JXMN109186", artifact_id: 1, source: "detail",
             fetched_at: "2026-01-01 00:00:00+00",
             price: 30000, mileage: 100, listing_state: "active"}
          - {listing_id: "L1", vin17: null, artifact_id: 2, source: "srp",
             fetched_at: "2026-01-01 06:00:00+00",
             price: 30000, mileage: 100, listing_state: "active"}
          - {listing_id: "L1", vin17: null, artifact_id: 3, source: "carousel",
             fetched_at: "2026-01-01 12:00:00+00",
             price: 30000, mileage: 100, listing_state: "active"}
    expect:
      rows:
        - {listing_id: "L1", vin17: "1HGBH41JXMN109186",
           observation_count: 3, detail_observation_count: 1, srp_observation_count: 1,
           carousel_observation_count: 1, distinct_source_count: 3,
           detail_seen: true, srp_seen: true, carousel_seen: true,
           is_open_run: true, hours_until_next_observation: null,
           next_observation_started_at: null}

  - name: test_observation_runs_srp_only_refresh_opens_new_run
    description: >
      A detail observation followed by an SRP-only price refresh opens a new
      run — proving a non-detail source alone can close out the prior run and
      start a new cadence period.
    model: int_listing_observation_runs
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('int_listing_observation_fingerprints')
        rows:
          - {listing_id: "L2", vin17: "2HGBH41JXMN209187", artifact_id: 10, source: "detail",
             fetched_at: "2026-01-01 00:00:00+00",
             price: 20000, mileage: 5000, listing_state: "active"}
          - {listing_id: "L2", vin17: null, artifact_id: 11, source: "srp",
             fetched_at: "2026-01-02 00:00:00+00",
             price: 19000, mileage: 5000, listing_state: "active"}
    expect:
      rows:
        - {listing_id: "L2", price: 20000,
           observation_count: 1, detail_observation_count: 1, srp_observation_count: 0,
           carousel_observation_count: 0, is_open_run: false, hours_until_next_observation: 24}
        - {listing_id: "L2", price: 19000,
           observation_count: 1, detail_observation_count: 0, srp_observation_count: 1,
           carousel_observation_count: 0, detail_seen: false, srp_seen: true,
           is_open_run: true, hours_until_next_observation: null}

  - name: test_observation_runs_source_switch_without_state_change_stays_one_run
    description: >
      A detail observation followed by an SRP observation with the IDENTICAL
      price/mileage/state must stay a single run — proving the run boundary is
      not accidentally source-driven (parsed_fingerprint, which includes
      source, would have split this into two runs; observation_state_key does
      not).
    model: int_listing_observation_runs
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('int_listing_observation_fingerprints')
        rows:
