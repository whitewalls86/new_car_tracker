  - name: test_observation_runs_collapses_across_sources
    description: >
      One listing with detail + srp + carousel observations sharing the same
      price/mileage/listing_state collapses to a single run with per-source
      counts/flags set and vin17 resolved from the one row that has it — even
      though each row's underlying parsed_fingerprint differs by source, this
      model's own observation_state_key (price/mileage/listing_state only)
      correctly treats them as one unchanged-state run.
    model: int_listing_observation_runs
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('int_listing_observation_fingerprints')
        rows:
          - {listing_id: "L1", vin17: "1HGBH41JXMN109186", artifact_id: 1, source: "detail",
             fetched_at: "2026-01-01 00:00:00+00",
             price: 30000, mileage: 100, listing_state: "active"}
          - {listing_id: "L1", vin17: null, artifact_id: 2, source: "srp",
             fetched_at: "2026-01-01 06:00:00+00",
             price: 30000, mileage: 100, listing_state: "active"}
          - {listing_id: "L1", vin17: null, artifact_id: 3, source: "carousel",
             fetched_at: "2026-01-01 12:00:00+00",
             price: 30000, mileage: 100, listing_state: "active"}
    expect:
      rows:
        - {listing_id: "L1", vin17: "1HGBH41JXMN109186",
           observation_count: 3, detail_observation_count: 1, srp_observation_count: 1,
           carousel_observation_count: 1, distinct_source_count: 3,
