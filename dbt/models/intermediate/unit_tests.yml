unit_tests:

  # ---------------------------------------------------------------------------
  # int_latest_observation — source priority + recency
  # ---------------------------------------------------------------------------

  - name: test_detail_wins_over_srp_same_vin
    description: "Detail observation wins over SRP for the same VIN (source priority)"
    model: int_latest_observation
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('stg_observations')
        rows:
          - {vin17: "1HGBH41JXMN109186", listing_id: "L1", source: "srp",
             make: "SRP-Make", fetched_at: "2026-01-10 14:00:00+00", artifact_id: 1}
          - {vin17: "1HGBH41JXMN109186", listing_id: "L1", source: "detail",
             make: "Detail-Make", fetched_at: "2026-01-10 12:00:00+00", artifact_id: 2}
    expect:
      rows:
        - {vin17: "1HGBH41JXMN109186", source: "detail", make: "Detail-Make"}

  - name: test_detail_wins_even_when_srp_is_fresher
    description: "Detail always beats SRP regardless of recency — source_priority first"
    model: int_latest_observation
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('stg_observations')
        rows:
          - {vin17: "1HGBH41JXMN109186", listing_id: "L1", source: "srp",
             make: "SRP-Make", fetched_at: "2026-01-10 14:00:00+00", artifact_id: 1}
          - {vin17: "1HGBH41JXMN109186", listing_id: "L1", source: "detail",
             make: "Detail-Make", fetched_at: "2026-01-09 12:00:00+00", artifact_id: 2}
    expect:
      rows:
        - {vin17: "1HGBH41JXMN109186", source: "detail", make: "Detail-Make"}

  - name: test_srp_only_vin_passes_through
    description: "VIN with only SRP observations passes through as-is"
    model: int_latest_observation
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('stg_observations')
        rows:
          - {vin17: "1HGBH41JXMN109186", listing_id: "L1", source: "srp",
             make: "Honda", fetched_at: "2026-01-10 12:00:00+00", artifact_id: 1}
    expect:
      rows:
        - {vin17: "1HGBH41JXMN109186", source: "srp", make: "Honda"}

  - name: test_null_vin17_excluded
    description: "Rows with null vin17 are excluded from the output"
    model: int_latest_observation
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('stg_observations')
        rows:
          - {vin17: null, listing_id: "L1", source: "srp",
             make: "Honda", fetched_at: "2026-01-10 12:00:00+00", artifact_id: 1}
          - {vin17: "1HGBH41JXMN109186", listing_id: "L2", source: "srp",
             make: "Toyota", fetched_at: "2026-01-10 12:00:00+00", artifact_id: 2}
    expect:
      rows:
        - {vin17: "1HGBH41JXMN109186", make: "Toyota"}

  - name: test_fresher_srp_wins_over_older_srp
    description: "When both are SRP, the fresher observation wins"
    model: int_latest_observation
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('stg_observations')
        rows:
          - {vin17: "1HGBH41JXMN109186", listing_id: "L1", source: "srp",
             make: "Old-Make", fetched_at: "2026-01-08 12:00:00+00", artifact_id: 1}
          - {vin17: "1HGBH41JXMN109186", listing_id: "L1", source: "srp",
             make: "New-Make", fetched_at: "2026-01-10 12:00:00+00", artifact_id: 2}
    expect:
      rows:
        - {vin17: "1HGBH41JXMN109186", make: "New-Make"}

  # ---------------------------------------------------------------------------
  # int_price_history — price drop/increase counting
  # ---------------------------------------------------------------------------

  - name: test_price_drop_and_increase_counts
    description: >
      Five price events: 100 -> 120 -> 90 -> 90 -> 110.
      Drops: 120->90 (1). Increases: 100->120, 90->110 (2). Flat: 90->90 (ignored).
    model: int_price_history
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('stg_price_events')
        rows:
          - {vin: "TEST00000000000V1", price: 100, event_at: "2026-01-01 12:00:00+00"}
          - {vin: "TEST00000000000V1", price: 120, event_at: "2026-01-03 12:00:00+00"}
          - {vin: "TEST00000000000V1", price: 90,  event_at: "2026-01-05 12:00:00+00"}
          - {vin: "TEST00000000000V1", price: 90,  event_at: "2026-01-07 12:00:00+00"}
          - {vin: "TEST00000000000V1", price: 110, event_at: "2026-01-09 12:00:00+00"}
    expect:
      rows:
        - {vin: "TEST00000000000V1", price_drop_count: 1, price_increase_count: 2,
           first_price: 100, min_price: 90, max_price: 120, current_price: 110,
           total_price_observations: 5}

  - name: test_single_observation_no_drops_or_increases
    description: "A single price event produces 0 drops and 0 increases"
    model: int_price_history
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('stg_price_events')
        rows:
          - {vin: "TEST00000000000V1", price: 25000, event_at: "2026-01-10 12:00:00+00"}
    expect:
      rows:
        - {vin: "TEST00000000000V1", price_drop_count: 0, price_increase_count: 0,
           first_price: 25000, current_price: 25000, min_price: 25000, max_price: 25000,
           total_price_observations: 1}

  - name: test_monotonic_drops
    description: "Three consecutive price drops: 50000 -> 45000 -> 40000"
    model: int_price_history
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('stg_price_events')
        rows:
          - {vin: "TEST00000000000V1", price: 50000, event_at: "2026-01-01 12:00:00+00"}
          - {vin: "TEST00000000000V1", price: 45000, event_at: "2026-01-05 12:00:00+00"}
          - {vin: "TEST00000000000V1", price: 40000, event_at: "2026-01-10 12:00:00+00"}
    expect:
      rows:
        - {vin: "TEST00000000000V1", price_drop_count: 2, price_increase_count: 0,
           first_price: 50000, current_price: 40000}

  - name: test_multiple_vins_independent
    description: "Price history is computed independently per VIN"
    model: int_price_history
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('stg_price_events')
        rows:
          - {vin: "VIN0000000000001A", price: 100, event_at: "2026-01-01 12:00:00+00"}
          - {vin: "VIN0000000000001A", price: 80,  event_at: "2026-01-05 12:00:00+00"}
          - {vin: "VIN0000000000002B", price: 200, event_at: "2026-01-01 12:00:00+00"}
          - {vin: "VIN0000000000002B", price: 250, event_at: "2026-01-05 12:00:00+00"}
    expect:
      rows:
        - {vin: "VIN0000000000001A", price_drop_count: 1, price_increase_count: 0,
           current_price: 80}
        - {vin: "VIN0000000000002B", price_drop_count: 0, price_increase_count: 1,
           current_price: 250}

  # ---------------------------------------------------------------------------
  # int_benchmarks — national market aggregates per make/model
  # ---------------------------------------------------------------------------

  - name: test_benchmarks_single_vin
    description: "Single VIN produces listing_count=1 and median/avg equal to that VIN's price; discount_pct correct"
    model: int_benchmarks
    given:
      - input: ref('int_latest_observation')
        rows:
          - {vin17: "SINGLE0VIN0000001", make: "honda", model: "crv", msrp: 40000}
      - input: ref('int_price_history')
        rows:
          - {vin: "SINGLE0VIN0000001", current_price: 30000}
    expect:
      rows:
        - {make: "honda", model: "crv", national_listing_count: 1,
           national_avg_price: 30000, national_median_price: 30000,
           national_avg_discount_pct: 25.00}

  - name: test_benchmarks_three_vins_median
    description: "Three VINs at 20k/30k/40k — median=30k, avg=30k, count=3; null MSRP excluded from discount"
    model: int_benchmarks
    given:
      - input: ref('int_latest_observation')
        rows:
          - {vin17: "BENCH0VIN0000001A", make: "honda", model: "crv", msrp: null}
          - {vin17: "BENCH0VIN0000002B", make: "honda", model: "crv", msrp: null}
          - {vin17: "BENCH0VIN0000003C", make: "honda", model: "crv", msrp: null}
      - input: ref('int_price_history')
        rows:
          - {vin: "BENCH0VIN0000001A", current_price: 20000}
          - {vin: "BENCH0VIN0000002B", current_price: 30000}
          - {vin: "BENCH0VIN0000003C", current_price: 40000}
    expect:
      rows:
        - {make: "honda", model: "crv", national_listing_count: 3,
           national_median_price: 30000, national_avg_price: 30000,
           national_avg_discount_pct: null}

  # ---------------------------------------------------------------------------
  # int_listing_state_fingerprints — filter behavior
  # ---------------------------------------------------------------------------

  - name: test_fingerprints_excludes_non_detail_and_null_vin
    description: "SRP rows and rows with null vin17 are excluded; only detail+valid-vin rows appear"
    model: int_listing_state_fingerprints
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('stg_observations')
        rows:
          - {artifact_id: 1, listing_id: "L1", vin17: "1HGBH41JXMN109186", source: "detail",
             fetched_at: "2026-01-10 12:00:00+00", price: 30000, mileage: 100, listing_state: "active"}
          - {artifact_id: 2, listing_id: "L2", vin17: "1HGBH41JXMN109186", source: "srp",
             fetched_at: "2026-01-10 13:00:00+00", price: 30000, mileage: 100, listing_state: "active"}
          - {artifact_id: 3, listing_id: "L3", vin17: null, source: "detail",
             fetched_at: "2026-01-10 14:00:00+00", price: 30000, mileage: 100, listing_state: "active"}
    expect:
      rows:
        - {artifact_id: 1, listing_id: "L1", vin17: "1HGBH41JXMN109186"}

  - name: test_fingerprints_identical_inputs_same_hash
    description: "Two detail rows with identical business fields produce the same parsed_fingerprint"
    model: int_listing_state_fingerprints
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('stg_observations')
        rows:
          - {artifact_id: 1, listing_id: "L1", vin17: "1HGBH41JXMN109186", source: "detail",
             fetched_at: "2026-01-10 10:00:00+00", price: 30000, mileage: 5000, listing_state: "active",
             make: "honda", model: "crv", vehicle_trim: "EX", model_year: 2024,
             msrp: 35000, stock_type: "new", fuel_type: "gasoline", body_style: "suv",
             dealer_name: "Test Dealer", dealer_zip: "90210", dealer_city: "Los Angeles",
             dealer_state: "CA", customer_id: "D001"}
          - {artifact_id: 2, listing_id: "L1", vin17: "1HGBH41JXMN109186", source: "detail",
             fetched_at: "2026-01-10 16:00:00+00", price: 30000, mileage: 5000, listing_state: "active",
             make: "honda", model: "crv", vehicle_trim: "EX", model_year: 2024,
             msrp: 35000, stock_type: "new", fuel_type: "gasoline", body_style: "suv",
             dealer_name: "Test Dealer", dealer_zip: "90210", dealer_city: "Los Angeles",
             dealer_state: "CA", customer_id: "D001"}
    expect:
      rows:
        - {artifact_id: 1, vin17: "1HGBH41JXMN109186", price: 30000, mileage: 5000, listing_state: "active",
           parsed_fingerprint: "bb31f33225ad43103c76daa93981a307"}
        - {artifact_id: 2, vin17: "1HGBH41JXMN109186", price: 30000, mileage: 5000, listing_state: "active",
           parsed_fingerprint: "bb31f33225ad43103c76daa93981a307"}

  - name: test_fingerprints_price_sensitivity
    description: "A $1 price change (30000 → 29999) produces a different parsed_fingerprint"
    model: int_listing_state_fingerprints
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('stg_observations')
        rows:
          - {artifact_id: 1, listing_id: "L1", vin17: "1HGBH41JXMN109186", source: "detail",
             fetched_at: "2026-01-10 10:00:00+00", price: 30000, mileage: 5000, listing_state: "active",
             make: "honda", model: "crv", vehicle_trim: "EX", model_year: 2024,
             msrp: 35000, stock_type: "new", fuel_type: "gasoline", body_style: "suv",
             dealer_name: "Test Dealer", dealer_zip: "90210", dealer_city: "Los Angeles",
             dealer_state: "CA", customer_id: "D001"}
          - {artifact_id: 2, listing_id: "L1", vin17: "1HGBH41JXMN109186", source: "detail",
             fetched_at: "2026-01-10 16:00:00+00", price: 29999, mileage: 5000, listing_state: "active",
             make: "honda", model: "crv", vehicle_trim: "EX", model_year: 2024,
             msrp: 35000, stock_type: "new", fuel_type: "gasoline", body_style: "suv",
             dealer_name: "Test Dealer", dealer_zip: "90210", dealer_city: "Los Angeles",
             dealer_state: "CA", customer_id: "D001"}
    expect:
      rows:
        - {artifact_id: 1, parsed_fingerprint: "bb31f33225ad43103c76daa93981a307"}
        - {artifact_id: 2, parsed_fingerprint: "4d9c43601bd925a806b5e496ee3f7593"}

  - name: test_fingerprints_listing_state_sensitivity
    description: "A listing_state change (active → unavailable) produces a different parsed_fingerprint"
    model: int_listing_state_fingerprints
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('stg_observations')
        rows:
          - {artifact_id: 1, listing_id: "L1", vin17: "1HGBH41JXMN109186", source: "detail",
             fetched_at: "2026-01-10 10:00:00+00", price: 30000, mileage: 5000, listing_state: "active",
             make: "honda", model: "crv", vehicle_trim: "EX", model_year: 2024,
             msrp: 35000, stock_type: "new", fuel_type: "gasoline", body_style: "suv",
             dealer_name: "Test Dealer", dealer_zip: "90210", dealer_city: "Los Angeles",
             dealer_state: "CA", customer_id: "D001"}
          - {artifact_id: 2, listing_id: "L1", vin17: "1HGBH41JXMN109186", source: "detail",
             fetched_at: "2026-01-10 16:00:00+00", price: 30000, mileage: 5000, listing_state: "unavailable",
             make: "honda", model: "crv", vehicle_trim: "EX", model_year: 2024,
             msrp: 35000, stock_type: "new", fuel_type: "gasoline", body_style: "suv",
             dealer_name: "Test Dealer", dealer_zip: "90210", dealer_city: "Los Angeles",
             dealer_state: "CA", customer_id: "D001"}
    expect:
      rows:
        - {artifact_id: 1, parsed_fingerprint: "bb31f33225ad43103c76daa93981a307"}
        - {artifact_id: 2, parsed_fingerprint: "50711e6e84c56f7732b64b4e579428c6"}

  # ---------------------------------------------------------------------------
  # int_listing_observation_fingerprints — all-source filter and key behavior
  # ---------------------------------------------------------------------------

  - name: test_observation_fingerprints_includes_all_three_sources
    description: "detail, srp, and carousel rows all pass through when listing_id is present"
    model: int_listing_observation_fingerprints
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('stg_observations')
        rows:
          - {artifact_id: 1, listing_id: "L1", vin17: "1HGBH41JXMN109186", source: "detail",
             fetched_at: "2026-01-10 12:00:00+00", price: 30000, mileage: 100, listing_state: "active"}
          - {artifact_id: 2, listing_id: "L2", vin17: "1HGBH41JXMN109186", source: "srp",
             fetched_at: "2026-01-10 13:00:00+00", price: 30000, mileage: 100, listing_state: "active"}
          - {artifact_id: 3, listing_id: "L3", vin17: null, source: "carousel",
             fetched_at: "2026-01-10 14:00:00+00", price: 30000, mileage: 100, listing_state: "active"}
    expect:
      rows:
        - {artifact_id: 1, listing_id: "L1", source: "detail"}
        - {artifact_id: 2, listing_id: "L2", source: "srp"}
        - {artifact_id: 3, listing_id: "L3", source: "carousel"}

  - name: test_observation_fingerprints_excludes_null_listing_id
    description: "Rows with a null listing_id are excluded regardless of source"
    model: int_listing_observation_fingerprints
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('stg_observations')
        rows:
          - {artifact_id: 1, listing_id: null, vin17: "1HGBH41JXMN109186", source: "detail",
             fetched_at: "2026-01-10 12:00:00+00"}
          - {artifact_id: 2, listing_id: "L2", vin17: null, source: "srp",
             fetched_at: "2026-01-10 13:00:00+00"}
    expect:
      rows:
        - {artifact_id: 2, listing_id: "L2"}

  - name: test_observation_fingerprints_srp_artifact_multiple_listings
    description: "One SRP artifact_id with two listing_ids produces two distinct observation_id rows, not one"
    model: int_listing_observation_fingerprints
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('stg_observations')
        rows:
          - {artifact_id: 100, listing_id: "L1", vin17: "1HGBH41JXMN109186", source: "srp",
             fetched_at: "2026-01-10 12:00:00+00", price: 30000}
          - {artifact_id: 100, listing_id: "L2", vin17: "2HGBH41JXMN209187", source: "srp",
             fetched_at: "2026-01-10 12:00:00+00", price: 25000}
    expect:
      rows:
        - {artifact_id: 100, listing_id: "L1", price: 30000}
        - {artifact_id: 100, listing_id: "L2", price: 25000}

  - name: test_observation_fingerprints_carousel_artifact_multiple_listings
    description: "One carousel artifact_id with two listing_ids produces two distinct observation_id rows, not one"
    model: int_listing_observation_fingerprints
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('stg_observations')
        rows:
          - {artifact_id: 200, listing_id: "L3", vin17: null, source: "carousel",
             fetched_at: "2026-01-10 12:00:00+00", price: 20000}
          - {artifact_id: 200, listing_id: "L4", vin17: null, source: "carousel",
             fetched_at: "2026-01-10 12:00:00+00", price: 22000}
    expect:
      rows:
        - {artifact_id: 200, listing_id: "L3", price: 20000}
        - {artifact_id: 200, listing_id: "L4", price: 22000}

  - name: test_observation_fingerprints_written_at_breaks_fetched_at_tie
    description: >
      Two rows share the same artifact_id, listing_id, and fetched_at (a
      reprocessing correction re-landed with the same observation time) —
      only written_at differs. The later written_at row must win, proving the
      dedupe tiebreaker isn't just fetched_at-desc.
    model: int_listing_observation_fingerprints
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('stg_observations')
        rows:
          - {artifact_id: 300, listing_id: "L5", vin17: null, source: "srp",
             fetched_at: "2026-01-10 12:00:00+00", written_at: "2026-01-10 13:00:00+00",
             price: 23000}
          - {artifact_id: 300, listing_id: "L5", vin17: null, source: "srp",
             fetched_at: "2026-01-10 12:00:00+00", written_at: "2026-01-11 09:00:00+00",
             price: 23500}
    expect:
      rows:
        - {artifact_id: 300, listing_id: "L5", price: 23500}

  # ---------------------------------------------------------------------------
  # int_listing_state_runs — gaps-and-islands logic
  # ---------------------------------------------------------------------------

  - name: test_runs_collapses_identical_fingerprints
    description: "Three detail rows with same fingerprint collapse to one run with artifact_count=3"
    model: int_listing_state_runs
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('int_listing_state_fingerprints')
        rows:
          - {vin17: "1HGBH41JXMN109186", listing_id: "L1", artifact_id: 1,
             fetched_at: "2026-01-01 00:00:00+00", parsed_fingerprint: "fp_a",
             price: 30000, mileage: 5000, listing_state: "active"}
          - {vin17: "1HGBH41JXMN109186", listing_id: "L1", artifact_id: 2,
             fetched_at: "2026-01-01 06:00:00+00", parsed_fingerprint: "fp_a",
             price: 30000, mileage: 5000, listing_state: "active"}
          - {vin17: "1HGBH41JXMN109186", listing_id: "L1", artifact_id: 3,
             fetched_at: "2026-01-01 12:00:00+00", parsed_fingerprint: "fp_a",
             price: 30000, mileage: 5000, listing_state: "active"}
    expect:
      rows:
        - {vin17: "1HGBH41JXMN109186", listing_id: "L1", parsed_fingerprint: "fp_a",
           artifact_count: 3, is_open_run: true, hours_until_change: null,
           next_state_started_at: null}

  - name: test_runs_splits_on_price_or_state_change
    description: "Two rows with different fingerprints (simulating a price change) produce two runs"
    model: int_listing_state_runs
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('int_listing_state_fingerprints')
        rows:
          - {vin17: "1HGBH41JXMN109186", listing_id: "L1", artifact_id: 1,
             fetched_at: "2026-01-01 00:00:00+00", parsed_fingerprint: "fp_a",
             price: 30000, mileage: 5000, listing_state: "active"}
          - {vin17: "1HGBH41JXMN109186", listing_id: "L1", artifact_id: 2,
             fetched_at: "2026-01-02 00:00:00+00", parsed_fingerprint: "fp_b",
             price: 29000, mileage: 5000, listing_state: "active"}
    expect:
      rows:
        - {vin17: "1HGBH41JXMN109186", parsed_fingerprint: "fp_a",
           artifact_count: 1, is_open_run: false, hours_until_change: 24}
        - {vin17: "1HGBH41JXMN109186", parsed_fingerprint: "fp_b",
           artifact_count: 1, is_open_run: true, hours_until_change: null}

  - name: test_runs_relisting_new_listing_id_opens_new_run
    description: "Same VIN with a new listing_id (different fingerprint) opens a new run"
    model: int_listing_state_runs
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('int_listing_state_fingerprints')
        rows:
          - {vin17: "1HGBH41JXMN109186", listing_id: "L1", artifact_id: 1,
             fetched_at: "2026-01-01 00:00:00+00", parsed_fingerprint: "fp_dealer_a",
             price: 30000, mileage: 5000, listing_state: "active"}
          - {vin17: "1HGBH41JXMN109186", listing_id: "L2", artifact_id: 2,
             fetched_at: "2026-01-10 00:00:00+00", parsed_fingerprint: "fp_dealer_b",
             price: 28000, mileage: 5000, listing_state: "active"}
    expect:
      rows:
