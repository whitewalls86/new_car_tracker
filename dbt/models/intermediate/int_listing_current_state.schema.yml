version: 2

models:
  - name: int_listing_current_state
    description: >
      Most recent listing state per listing_id from detail observations.
      Replaces the legacy `listing_current_state` materialized view.
    columns:
      - name: listing_id
        description: Cars.com listing UUID
        tests:
          - unique
          - not_null
      - name: listing_state
        description: "Current state: 'active' or 'unlisted'"
      - name: listing_state_seen_at
        description: Timestamp when this state was last observed
      - name: listing_state_artifact_id
        description: FK to raw_artifacts for the observation source
