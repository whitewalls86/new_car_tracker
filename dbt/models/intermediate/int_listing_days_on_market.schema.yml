version: 2

models:
  - name: int_listing_days_on_market
    description: Days on market per VIN — first/last seen, days tracked, observation counts.
    columns:
      - name: vin
        data_tests:
          - not_null
          - unique
          - valid_vin
      - name: first_seen_at
        data_tests:
          - not_null
      - name: last_seen_at
        data_tests:
          - not_null
