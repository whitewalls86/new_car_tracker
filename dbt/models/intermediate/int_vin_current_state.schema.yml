version: 2

models:
  - name: int_vin_current_state
    description: >
      Most recent listing state per VIN from detail observations.
      Replaces the legacy `vin_current_state` materialized view.
    columns:
      - name: vin
        description: 17-character VIN
        tests:
          - unique
          - not_null
      - name: listing_state
        description: "Current state: 'active' or 'unlisted'"
      - name: state_seen_at
        description: Timestamp when this state was last observed
      - name: state_artifact_id
        description: FK to raw_artifacts for the observation source
