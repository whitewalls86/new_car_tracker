version: 2

sources:
  # ---------------------------------------------------------------------------
  # Silver — unified parsed observations in MinIO (primary record)
  # ---------------------------------------------------------------------------
  - name: silver
    description: "Parsed observations — hive-partitioned Parquet in MinIO"
    tables:
      - name: observations
        description: >
          All parsed observations from SRP, detail, and carousel pages.
          Partitioned by source/obs_year/obs_month/obs_day.
          Source values: 'srp', 'detail', 'carousel'.
        meta:
          external_location: >
            read_parquet(
              's3://{{ env_var("MINIO_BUCKET", "bronze") }}/silver/observations/**/*.parquet',
              hive_partitioning=true
            )
        columns:
          - name: artifact_id
          - name: listing_id
          - name: vin
          - name: canonical_detail_url
          - name: source
          - name: listing_state
          - name: fetched_at
          - name: written_at
          - name: price
          - name: make
          - name: model
          - name: trim
          - name: year
          - name: mileage
          - name: msrp
          - name: stock_type
          - name: fuel_type
          - name: body_style
          - name: dealer_name
          - name: dealer_zip
          - name: customer_id
          - name: seller_id
          - name: financing_type
          - name: seller_zip
          - name: seller_customer_id
          - name: page_number
          - name: position_on_page
          - name: trid
          - name: isa_context
          - name: body
          - name: condition
          - name: obs_year
          - name: obs_month
          - name: obs_day

  # ---------------------------------------------------------------------------
  # Ops events — append-only event logs in MinIO
  # ---------------------------------------------------------------------------
  - name: ops_events
    description: "Operational event logs flushed from Postgres staging tables to MinIO"
    tables:
      - name: price_observation_events
        description: >
          Price observation events written by the processing service each time
          a listing price is written to ops.price_observations. One row per
          write operation. event_type values: 'upserted', 'deleted', 'added'.
          Partitioned by year/month.
        meta:
          external_location: >
            read_parquet(
              's3://{{ env_var("MINIO_BUCKET", "bronze") }}/ops/price_observation_events/**/*.parquet',
              hive_partitioning=true
            )
        columns:
          - name: event_id
          - name: listing_id
          - name: vin
          - name: price
          - name: make
          - name: model
          - name: artifact_id
          - name: event_type
          - name: source
          - name: event_at
          - name: year
          - name: month

      - name: vin_to_listing_events
        description: >
          VIN-to-listing mapping events. Recorded when a VIN is first mapped
          to a listing or remapped to a new one. event_type values: 'mapped',
          'remapped'. Partitioned by year/month.
        meta:
          external_location: >
            read_parquet(
              's3://{{ env_var("MINIO_BUCKET", "bronze") }}/ops/vin_to_listing_events/**/*.parquet',
              hive_partitioning=true
            )
        columns:
          - name: event_id
          - name: vin
          - name: listing_id
          - name: artifact_id
          - name: event_type
          - name: previous_listing_id
          - name: event_at
          - name: year
          - name: month

      - name: blocked_cooldown_events
        description: >
          403 cooldown lifecycle events. event_type values: 'blocked',
          'incremented'. Partitioned by year/month.
        meta:
          external_location: >
            read_parquet(
              's3://{{ env_var("MINIO_BUCKET", "bronze") }}/ops/blocked_cooldown_events/**/*.parquet',
              hive_partitioning=true
            )
        columns:
          - name: event_id
          - name: listing_id
          - name: event_type
          - name: num_of_attempts
          - name: event_at
          - name: year
          - name: month

  # ---------------------------------------------------------------------------
  # Operational Postgres tables (via postgres_scan)
  # These are live HOT tables — read for current config/reference data only.
  # ---------------------------------------------------------------------------
  - name: public
    description: "Operational Postgres tables — config and reference data"
    schema: public
    tables:
      - name: search_configs
        description: "Active search configurations. One row per make/model/location combination."
        meta:
          external_location: "postgres_scan('{{ env_var(\"POSTGRES_URL\") }}', 'public', 'search_configs')"
        columns:
          - name: search_key
          - name: enabled
          - name: source
          - name: params
          - name: rotation_slot
          - name: last_queued_at


