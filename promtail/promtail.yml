server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  - job_name: ops
    static_configs:
      - targets:
          - localhost
        labels:
          service: ops
          __path__: /logs/ops/app.log*

    pipeline_stages:
      - json:
          expressions:
            ts: ts
            level: level
            logger: logger
      - labels:
          level:
          logger:
      - timestamp:
          source: ts
          format: '2006-01-02 15:04:05,000'

  - job_name: scraper
    static_configs:
